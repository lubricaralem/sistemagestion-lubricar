// IVA — IMPORTACIÓN MASIVA DESDE EXCEL
// ══════════════════════════════════════════════════════════
window.iva_importarExcel = async function(input) {
  const file = input.files[0]; if(!file) return;
  input.value = '';

  // Leer el archivo como ArrayBuffer
  const buf = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error('Error al leer el archivo'));
    r.readAsArrayBuffer(file);
  });

  // Parsear con SheetJS (cargado desde CDN)
  let XLSX;
  try {
    XLSX = window.XLSX;
    if (!XLSX) throw new Error('SheetJS no disponible');
  } catch(e) {
    alert('Error: librería de Excel no disponible. Recargá la página e intentá de nuevo.');
    return;
  }

  const workbook = XLSX.read(buf, { type: 'array', cellDates: true });

  // ── VENTAS ──
  let sheetV = workbook.Sheets['📊 VENTAS'] || workbook.Sheets['VENTAS'];
  // Intentar con cualquier hoja que contenga "VENT"
  if (!sheetV) {
    const key = Object.keys(workbook.Sheets).find(k => k.toUpperCase().includes('VENT'));
    if (key) sheetV = workbook.Sheets[key];
  }

  // ── COMPRAS ──
  let sheetC = workbook.Sheets['🧾 COMPRAS'] || workbook.Sheets['COMPRAS'];
  if (!sheetC) {
    const key = Object.keys(workbook.Sheets).find(k => k.toUpperCase().includes('COMPRA'));
    if (key) sheetC = workbook.Sheets[key];
  }

  if (!sheetV && !sheetC) {
    alert('No se encontraron las hojas "VENTAS" o "COMPRAS" en el archivo.\nAsegurate de usar la planilla descargada desde el sistema.');
    return;
  }

  function excelDateToISO(val) {
    if (!val) return '';
    if (val instanceof Date) {
      const y = val.getFullYear(), m = String(val.getMonth()+1).padStart(2,'0'), d = String(val.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }
    if (typeof val === 'string') {
      // DD/MM/AAAA
      const m = val.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
      // AAAA-MM-DD
      if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
    }
    if (typeof val === 'number') {
      // Excel serial date
      const d = new Date(Math.round((val - 25569) * 86400 * 1000));
      const y = d.getUTCFullYear(), mo = String(d.getUTCMonth()+1).padStart(2,'0'), dy = String(d.getUTCDate()).padStart(2,'0');
      return `${y}-${mo}-${dy}`;
    }
    return '';
  }

  let ventasImportadas = 0, comprasImportadas = 0, errores = [];

  // Parsear ventas
  if (sheetV) {
    const rows = XLSX.utils.sheet_to_json(sheetV, { defval: '' });
    rows.forEach((row, idx) => {
      const fecha = excelDateToISO(row.fecha);
      const monto = parseFloat(row.monto_total) || 0;
      const iva   = parseFloat(row.iva) || 0;
      const tipo  = (row.tipo || '').toString().trim();
      if (!fecha || !monto || !tipo) return; // fila vacía o ejemplo
      const tiposValidos = ['Ticket', 'Factura A', 'Factura B', 'Factura C'];
      if (!tiposValidos.includes(tipo)) {
        errores.push(`Venta fila ${idx+2}: tipo "${tipo}" no válido (usá: ${tiposValidos.join(', ')})`);
        return;
      }
      S.iva.ventas.push({
        id: Date.now() + Math.random(),
        fecha, tipo, monto,
        iva: Math.round(iva * 100) / 100,
        numero: (row.numero || '').toString().trim()
      });
      ventasImportadas++;
    });
  }

  // Parsear compras
  if (sheetC) {
    const rows = XLSX.utils.sheet_to_json(sheetC, { defval: '' });
    rows.forEach((row, idx) => {
      const fecha  = excelDateToISO(row.fecha);
      const monto  = parseFloat(row.monto_total) || 0;
      const iva    = parseFloat(row.iva) || 0;
      const prov   = (row.proveedor || '').toString().trim();
      if (!fecha || !monto || !prov) return;
      S.iva.compras.push({
        id: Date.now() + Math.random(),
        fecha, proveedor: prov,
        numero: (row.numero || '').toString().trim(),
        monto, iva: Math.round(iva * 100) / 100
      });
      comprasImportadas++;
    });
  }

  if (ventasImportadas === 0 && comprasImportadas === 0) {
    alert('No se importó ningún registro.\nVerificá que las filas tengan fecha, monto y tipo/proveedor completados.');
    return;
  }

  // Ordenar
  S.iva.ventas.sort((a,b) => b.fecha.localeCompare(a.fecha));
  S.iva.compras.sort((a,b) => b.fecha.localeCompare(a.fecha));

  showLoading('Guardando en Firebase...');
  await save('iva');
  hideLoading();

  iva_dlUpdate(); iva_renderV(); iva_renderC(); iva_renderRes();

  let msg = `✅ Importación completada:\n  • ${ventasImportadas} ventas importadas\n  • ${comprasImportadas} compras importadas`;
  if (errores.length) msg += `\n\n⚠ Errores (${errores.length}):\n` + errores.slice(0,5).join('\n');
  alert(msg);
};

let pedNuevoEstado = 'pedido';
window.pedSetNuevoEstado = function(est, btn) {
  pedNuevoEstado = est;
  document.querySelectorAll('#ped-nuevo-estado .es-btn').forEach(b=>{
    b.className = 'es-btn';
  });

window.ped_guardar = async function() {
  const cliente = document.getElementById('ped-cliente').value.trim();
  const desc    = document.getElementById('ped-desc').value.trim();
  if(!cliente || !desc) { alert('Completá cliente y descripción'); return; }
  S.pedidos.items.push({
    id:          Date.now(),
    cliente,
    desc,
    stock:       document.getElementById('ped-stock').value,
    proveedor:   document.getElementById('ped-proveedor').value.trim(),
    fProveedor:  document.getElementById('ped-fproveedor').value,
    fCliente:    document.getElementById('ped-fcliente').value,
    obs:         document.getElementById('ped-obs').value.trim(),
    estado:      pedNuevoEstado,
    fechaCarga:  hoy(),
  });
  S.pedidos.items.sort((a,b)=>b.fechaCarga.localeCompare(a.fechaCarga));
  await save('pedidos');
  ['ped-cliente','ped-desc','ped-proveedor','ped-fproveedor','ped-fcliente','ped-obs'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('ped-stock').value='si';
  // Reset estado selector
  document.querySelectorAll('#ped-nuevo-estado .es-btn').forEach((b,i)=>{b.className='es-btn'+(i===0?' active-pedido':'');});
  pedNuevoEstado='pedido';
  ped_renderCards(); ped_render();
};

window.ped_cambiarEstado = async function(id, nuevoEstado, evt) { if(evt) evt.stopPropagation();
  const p = S.pedidos.items.find(x=>x.id===id); if(!p) return;
  p.estado = nuevoEstado;
  if(nuevoEstado==='retirado') p.fechaRetiro = hoy();
  await save('pedidos'); ped_renderCards(); ped_render();
};

window.ped_del = async function(id) {
  const p = S.pedidos.items.find(x=>x.id===id);
  const nombre = p ? p.cliente + ' — ' + (p.desc||'').slice(0,40) : 'este pedido';
  if(!confirm('¿Eliminás definitivamente el pedido de ' + nombre + '?\n\nEsta acción no se puede deshacer.')) return;
  S.pedidos.items = S.pedidos.items.filter(x=>x.id!==id);
  await save('pedidos'); ped_renderCards(); ped_render();
};

window.pedSetFiltro = function(filtro, btn) {

  document.querySelectorAll('#ped-activos .filter-row .fb').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');

function ped_renderCards() {
  const items = S.pedidos.items;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('ped-n-activos', items.filter(p=>p.estado!=='retirado').length);
  set('ped-n-listos',  items.filter(p=>p.estado==='listo').length);
  set('ped-n-espera',  items.filter(p=>p.estado==='espera').length);
  set('ped-n-retirados',items.filter(p=>p.estado==='retirado').length);
}

function ped_render() {
  let lista = S.pedidos.items.slice();
  const buscar = (document.getElementById('ped-buscar')?.value||'').toLowerCase();
  if(pedFiltro==='activos')   lista = lista.filter(p=>p.estado!=='retirado');
  else if(pedFiltro==='listo')    lista = lista.filter(p=>p.estado==='listo');
  else if(pedFiltro==='espera')   lista = lista.filter(p=>p.estado==='espera');
  else if(pedFiltro==='preparar') lista = lista.filter(p=>p.estado==='preparar');
  else if(pedFiltro==='pedido')   lista = lista.filter(p=>p.estado==='pedido');
  if(buscar) lista = lista.filter(p=>p.cliente.toLowerCase().includes(buscar)||p.desc.toLowerCase().includes(buscar));

  const bd=document.getElementById('ped-badge'); if(bd) bd.textContent=lista.length;
  const el=document.getElementById('ped-lista'); if(!el) return;
  if(!lista.length){el.innerHTML='<div class="empty">No hay pedidos en este filtro.</div>';return;}

  // Agrupar en 3 columnas tipo Trello (order-based, not by state)
  const orden = {listo:0, preparar:1, espera:2, pedido:3, retirado:4};
  lista.sort((a,b)=>(orden[a.estado]??5)-(orden[b.estado]??5)||a.fechaCarga.localeCompare(b.fechaCarga));

  // Distribuir en 3 columnas
  const cols = [[], [], []];
  lista.forEach((p, i) => cols[i % 3].push(p));

  function pedCard(p) {
    const est = ESTADOS_PEDIDO.find(e=>e.id===p.estado)||ESTADOS_PEDIDO[0];
    const descHtml = (p.desc||'').split(String.fromCharCode(10)).join('<br>');
    const estadoSelector = ESTADOS_PEDIDO.map(e=>{
      const isAct = p.estado===e.id;
      return '<button class="es-btn' + (isAct?' active-'+e.id:'') + '" onclick="ped_cambiarEstado('+p.id+',\''+e.id+'\',event)" title="'+e.label+'" style="min-width:auto;padding:6px 4px;flex:1"><div style="font-size:15px">'+e.icon+'</div><div style="font-size:9px">'+e.label+'</div></button>';
    }).join('');
    return '<div class="pedido-card st-'+p.estado+'" id="pedcard-'+p.id+'">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:8px">' +
        '<div style="flex:1;min-width:0"><div class="pedido-nombre" style="font-size:15px">' + p.cliente + '</div></div>' +
        '<span class="pedido-estado ' + est.cls + '" style="font-size:10px;white-space:nowrap">' + est.icon + ' ' + est.label + '</span>' +
      '</div>' +
      '<div style="font-size:12px;color:#444;line-height:1.4;margin-bottom:8px">' + descHtml + '</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">' +
        '<span class="pedido-stock ' + (p.stock==='si'?'stock-si':'stock-no') + '">' + (p.stock==='si'?'En stock':'A pedir') + '</span>' +
        (p.proveedor?'<span style="font-size:11px;color:#888">🏭 '+p.proveedor+'</span>':'') +
      '</div>' +
      '<div class="pedido-meta" style="font-size:11px">' +
        '<span>📅 ' + fmtF(p.fechaCarga) + '</span>' +
        (p.fCliente?'<span>🚗 '+fmtF(p.fCliente)+'</span>':'') +
      '</div>' +
      (p.obs?'<div style="font-size:11px;color:#888;font-style:italic;padding:4px 8px;background:var(--gray-light);border-radius:3px;margin:6px 0">💬 '+p.obs+'</div>':'') +
      '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-mid)">' +
        estadoSelector +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:6px;border-top:1px dashed var(--gray-mid)">' +
        '<button class="btn-s" onclick="ped_abrirEdit('+p.id+')" style="font-size:11px;padding:5px 12px">✏ Editar</button>' +
        '<button class="btn-s" onclick="ped_del('+p.id+')" style="font-size:10px;padding:4px 8px;color:#bbb;border-color:#e0e0e0" title="Eliminar pedido">🗑</button>' +
      '</div>' +
    '</div>';
  }

  el.innerHTML = '<div class="kanban-grid">' +
    cols.map(col =>
      '<div>' + (col.length ? col.map(pedCard).join('') : '<div style="text-align:center;color:#ccc;padding:20px;font-size:12px">—</div>') + '</div>'
    ).join('') +
  '</div>';
}

function bat_calcFin(fechaVenta, meses) {
  if(!fechaVenta || !meses) return '';
  const d = new Date(fechaVenta + 'T00:00:00');
  d.setMonth(d.getMonth() + parseInt(meses));
  return d.toISOString().split('T')[0];
}

function bat_diasRestantes(fechaFin) {
  if(!fechaFin) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fin  = new Date(fechaFin + 'T00:00:00');
  return Math.round((fin - hoy) / 86400000);
}

function bat_getEstado(b) {
  if(b.devolucion) {
    const res = b.devolucion.resolucion;
    if(res === 'reconocida') return { id:'reconocida', label:'Reconocida', cls:'be-reconocida', cardCls:'gar-reconocida', icon:'✔️' };
    if(res === 'rechazada')  return { id:'rechazada',  label:'Rechazada',  cls:'be-rechazada',  cardCls:'gar-rechazada',  icon:'❌' };
    return { id:'devolucion', label:'En devolución', cls:'be-devolucion', cardCls:'gar-devolucion', icon:'🔄' };
  }
  const dias = bat_diasRestantes(b.fechaFin);
  if(dias === null) return { id:'activa', label:'Garantía activa', cls:'be-activa', cardCls:'gar-activa', icon:'✅' };
  if(dias < 0)  return { id:'vencida',  label:'Garantía vencida', cls:'be-vencida',  cardCls:'gar-vencida',  icon:'⬜' };
  if(dias <= 30) return { id:'pronto',  label:'Vence pronto',     cls:'be-pronto',   cardCls:'gar-pronto',   icon:'⚠️' };
  return { id:'activa', label:'Garantía activa', cls:'be-activa', cardCls:'gar-activa', icon:'✅' };
}

function bat_render() {
  let lista = (S.baterias?.items||[]).slice();
  const buscar = (document.getElementById('bat-buscar')?.value||'').toLowerCase();
  if(buscar) lista = lista.filter(b=>
    b.modelo.toLowerCase().includes(buscar)||b.cliente.toLowerCase().includes(buscar)
  );
  if(batFiltro==='activas')     lista = lista.filter(b=>{ const e=bat_getEstado(b); return e.id==='activa'||e.id==='pronto'; });
  else if(batFiltro==='pronto') lista = lista.filter(b=>bat_getEstado(b).id==='pronto');
  else if(batFiltro==='devolucion') lista = lista.filter(b=>['devolucion','reconocida','rechazada'].includes(bat_getEstado(b).id));
  else if(batFiltro==='vencidas')   lista = lista.filter(b=>bat_getEstado(b).id==='vencida');

  const ord = {devolucion:0,pronto:1,activa:2,vencida:3,reconocida:4,rechazada:5};
  lista.sort((a,b)=>{
    const ea=bat_getEstado(a), eb=bat_getEstado(b);
    if((ord[ea.id]??9)!==(ord[eb.id]??9)) return (ord[ea.id]??9)-(ord[eb.id]??9);
    return (bat_diasRestantes(a.fechaFin)??9999)-(bat_diasRestantes(b.fechaFin)??9999);
  });

  const bd=document.getElementById('bat-badge'); if(bd) bd.textContent=lista.length;
  const el=document.getElementById('bat-lista'); if(!el) return;
  if(!lista.length){ el.innerHTML='<div class="empty">Sin baterías en este filtro.</div>'; return; }

  // Distribuir en 3 columnas
  const cols = [[], [], []];
  lista.forEach((b, i) => cols[i % 3].push(b));

  function batCard(b) {
    const est   = bat_getEstado(b);
    const dias  = bat_diasRestantes(b.fechaFin);
    const pct   = b.garantia ? Math.max(0, Math.min(100, Math.round((dias/(b.garantia*30))*100))) : 0;
    const barColor = est.id==='vencida'?'#ccc': est.id==='pronto'?'var(--gold)':'var(--green)';
    const dev = b.devolucion;
    const fdev_val=dev?.fdev||'', fenv_val=dev?.fenv||'', env_val=dev?.enviado||'no';
    const res_val=dev?.resolucion||'pendiente', result_val=dev?.resultado||'', coment_val=dev?.comentarios||'';

    let devPanel = '';
    if(dev) {
      devPanel = '<div class="devolucion-panel" style="margin-top:10px">' +
        '<div class="devolucion-title">🔄 Devolución en curso</div>' +
        '<div class="form-grid" style="margin-bottom:10px">' +
          '<div class="fg"><label>Fecha dev.</label><input type="date" id="bat-dev-fecha-'+b.id+'" value="'+fdev_val+'"/></div>' +
          '<div class="fg"><label>Enviada a revisión</label><select id="bat-dev-enviado-'+b.id+'"><option value="no"'+(env_val==='no'?' selected':'')+'>No todavía</option><option value="si"'+(env_val==='si'?' selected':'')+'>Sí</option></select></div>' +
          '<div class="fg"><label>Fecha envío</label><input type="date" id="bat-dev-fenv-'+b.id+'" value="'+fenv_val+'"/></div>' +
          '<div class="fg" style="grid-column:1/-1"><label>Resultado fabricante</label><input type="text" id="bat-dev-result-'+b.id+'" value="'+result_val+'" placeholder="Qué dijeron..."/></div>' +
          '<div class="fg" style="grid-column:1/-1"><label>Comentarios</label><input type="text" id="bat-dev-coment-'+b.id+'" value="'+coment_val+'"/></div>' +

window.bat_abrirEdit = function(id) {
  const b = S.baterias.items.find(x=>x.id===id); if(!b) return;
  document.getElementById('bat-edit-id').value = id;
  document.getElementById('bat-edit-modelo').value    = b.modelo||'';
  document.getElementById('bat-edit-cliente').value   = b.cliente||'';
  document.getElementById('bat-edit-patente').value   = b.patente||'';
  document.getElementById('bat-edit-fventa').value    = b.fventa||'';
  document.getElementById('bat-edit-garantia').value  = String(b.garantia||12);
  document.getElementById('bat-edit-fin').value       = b.fechaFin ? fmtF(b.fechaFin) : '';
  document.getElementById('bat-edit-comentarios').value = b.comentarios||'';
  cont_dlUpdate();
  document.getElementById('bat-edit-modal').classList.add('open');
};
window.bat_editCalcFin = function() {
  const fv = document.getElementById('bat-edit-fventa')?.value;
  const gm = document.getElementById('bat-edit-garantia')?.value;
  const el = document.getElementById('bat-edit-fin');
  if(el) el.value = fv && gm ? fmtF(bat_calcFin(fv, gm)) : '';
};
window.bat_guardarEdit = async function() {
  const id = parseInt(document.getElementById('bat-edit-id').value);
  const b  = S.baterias.items.find(x=>x.id===id); if(!b){alert('Error');return;}
  const modelo  = document.getElementById('bat-edit-modelo').value.trim();
  const cliente = document.getElementById('bat-edit-cliente').value.trim();
  const fventa  = document.getElementById('bat-edit-fventa').value;
  const garantia= document.getElementById('bat-edit-garantia').value;
  if(!modelo||!cliente||!fventa){alert('Completá modelo, cliente y fecha');return;}
  b.modelo=modelo; b.cliente=cliente;
  b.patente   = document.getElementById('bat-edit-patente').value.trim();
  b.fventa    = fventa;
  b.garantia  = parseInt(garantia);
  b.fechaFin  = bat_calcFin(fventa, garantia);
  b.comentarios = document.getElementById('bat-edit-comentarios').value.trim();
  await save('baterias');
  cerrarModal('bat-edit-modal');
  bat_render();
};

// Items temporales antes de guardar
let mercItemsTemp = [];

window.merc_addItemTemp = function() {
  const item = document.getElementById('merc-item')?.value.trim();
  const cant = parseFloat(document.getElementById('merc-cant')?.value)||1;
  if(!item){ alert('Ingresá el nombre del ítem'); return; }
  mercItemsTemp.push({
    item,
    cantidad: cant,
    unidad:   document.getElementById('merc-unidad')?.value || 'unidades',
    obs:      document.getElementById('merc-obs')?.value.trim() || ''
  });
  // Limpiar campos del ítem
  ['merc-item','merc-obs'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const el=document.getElementById('merc-cant');if(el)el.value='1';
  merc_renderItemsTemp();
};

window.merc_removeItemTemp = function(idx) {
  mercItemsTemp.splice(idx, 1);
  merc_renderItemsTemp();
};

function merc_renderItemsTemp() {
  const cont = document.getElementById('merc-items-temp');
  const countEl = document.getElementById('merc-temp-count');
  const btn = document.getElementById('merc-guardar-btn');
  if(!cont) return;
  if(!mercItemsTemp.length) {
    cont.innerHTML = '';
    if(countEl) countEl.textContent = '0 ítems agregados';
    if(btn){ btn.disabled=true; btn.style.opacity='.5'; btn.style.cursor='not-allowed'; }
    return;
  }
  if(countEl) countEl.textContent = mercItemsTemp.length + ' ítem' + (mercItemsTemp.length>1?'s':'') + ' agregado' + (mercItemsTemp.length>1?'s':'');
  if(btn){ btn.disabled=false; btn.style.opacity='1'; btn.style.cursor='pointer'; }
  cont.innerHTML = mercItemsTemp.map((it,i) =>
    '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border:1px solid var(--gray-mid);border-radius:4px;margin-bottom:6px;flex-wrap:wrap">' +
      '<div style="flex:1;min-width:0">' +
        '<span style="font-weight:700;font-size:13px">' + it.item + '</span>' +
        '<span style="font-size:11px;color:#888;margin-left:8px">' + it.cantidad + ' ' + it.unidad + (it.obs?' — '+it.obs:'') + '</span>' +
      '</div>' +
      '<button class="btn-s btn-del" onclick="merc_removeItemTemp('+i+')" style="font-size:11px;padding:3px 8px">✕</button>' +
    '</div>'
  ).join('');
}

window.merc_guardar = async function() {
  const prov = document.getElementById('merc-prov')?.value.trim();
  if(!prov){ alert('Ingresá el proveedor'); return; }
  if(!mercItemsTemp.length){ alert('Agregá al menos un ítem'); return; }
  const fpedido = document.getElementById('merc-fpedido')?.value || hoy();
  const frecep  = document.getElementById('merc-frecep')?.value || '';
  mercItemsTemp.forEach(it => {
    S.mercaderia.items.push({
      id:        Date.now() + Math.random(),
      proveedor: prov,
      item:      it.item,
      cantidad:  it.cantidad,
      unidad:    it.unidad,
      fpedido,
      frecep,
      obs:       it.obs,
      estado:    'pendiente',
      fRecibido: ''
    });
  });
  S.mercaderia.items.sort((a,b)=>a.proveedor.localeCompare(b.proveedor));
  await save('mercaderia');
  // Reset
  mercItemsTemp = [];
  ['merc-prov','merc-frecep'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const fp=document.getElementById('merc-fpedido');if(fp)fp.value=hoy();
  merc_renderItemsTemp();
  // Volver a pendientes
  const tabs=document.querySelectorAll('#merc-tw .tab');
  const panels=document.querySelectorAll('#merc-wrap .panel');
  tabs.forEach(t=>t.classList.remove('active')); panels.forEach(p=>p.classList.remove('active'));
  tabs[0].classList.add('active'); panels[0].classList.add('active');
  merc_renderCards(); merc_render();
};

window.merc_setEstado = async function(id, estado) {
  const it = S.mercaderia.items.find(x=>x.id===id); if(!it) return;
  it.estado = estado;
  if(estado==='recibido') it.fRecibido = hoy();
  await save('mercaderia'); merc_renderCards(); merc_render();
};

window.merc_del = async function(id) {
  const it = S.mercaderia.items.find(x=>x.id===id);
  const nombre = it ? it.item + ' ('+it.proveedor+')' : 'este ítem';
  if(!confirm('¿Eliminás ' + nombre + '?')) return;
  S.mercaderia.items = S.mercaderia.items.filter(x=>x.id!==id);
  await save('mercaderia'); merc_renderCards(); merc_render();
};

function merc_renderCards() {
  const items = S.mercaderia.items;
  const pend = items.filter(i=>i.estado!=='recibido').length;
  const ped  = items.filter(i=>i.estado==='pedido').length;
  const rec  = items.filter(i=>i.estado==='recibido').length;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('merc-n-pend',pend); set('merc-n-ped',ped); set('merc-n-rec',rec);
  set('merc-badge',pend);
}

function merc_render() {
  const buscar = (document.getElementById('merc-buscar')?.value||'').toLowerCase();
  let lista = S.mercaderia.items.filter(i=>i.estado!=='recibido');
  if(buscar) lista = lista.filter(i=>
    i.item.toLowerCase().includes(buscar)||i.proveedor.toLowerCase().includes(buscar)
  );

  const el = document.getElementById('merc-lista'); if(!el) return;
  if(!lista.length){ el.innerHTML='<div class="empty">No hay ítems pendientes.</div>'; return; }

  // Agrupar por proveedor
  const grupos = {};
  lista.forEach(i=>{
    if(!grupos[i.proveedor]) grupos[i.proveedor] = [];
    grupos[i.proveedor].push(i);
  });

  const provOrden = Object.keys(grupos).sort();
  el.innerHTML = provOrden.map(prov => {
    const items = grupos[prov];
    const todosP = items.every(i=>i.estado==='pedido');
    const totalItems = items.length;
    return '<div style="margin-bottom:16px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;background:var(--black);color:#fff;padding:10px 14px;border-radius:6px 6px 0 0;border-bottom:3px solid var(--gold)">' +
        '<span style="font-weight:700;font-size:14px;font-family:Montserrat,sans-serif;letter-spacing:.3px">🏭 '+prov+'</span>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span style="font-size:11px;color:#aaa">'+totalItems+' ítem'+(totalItems>1?'s':'')+'</span>' +
          '<button style="background:var(--gold);color:var(--black);border:none;padding:5px 12px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif" onclick="merc_pedirTodo(\'+prov+\')">✓ Marcar todo pedido</button>' +
        '</div>' +
      '</div>' +
      '<div style="border:1px solid var(--gray-mid);border-top:none;border-radius:0 0 6px 6px;overflow:hidden">' +
        items.map((it,idx) => {
          const esPedido = it.estado==='pedido';
          const hoy2 = hoy();
          const vence = it.frecep && it.frecep < hoy2 && !esPedido;
          return '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:'+(idx%2===0?'#fff':'#fafafa')+';border-bottom:1px solid #f0f0f0;flex-wrap:wrap">' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-weight:700;font-size:13px">' + it.item + '</div>' +
              '<div style="font-size:11px;color:#888;margin-top:2px;display:flex;gap:10px;flex-wrap:wrap">' +
                '<span>📦 '+it.cantidad+' '+it.unidad+'</span>' +
                (it.fpedido?'<span>📅 Pedido: '+fmtF(it.fpedido)+'</span>':'') +
                (it.frecep?'<span style="color:'+(vence?'var(--red)':'#888')+'">🚚 Recep: '+fmtF(it.frecep)+(vence?' ⚠':'')+'</span>':'') +
                (it.obs?'<span>💬 '+it.obs+'</span>':'') +
              '</div>' +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">' +

window.merc_renderHist = function() {
  const buscar = (document.getElementById('merc-hist-buscar')?.value||'').toLowerCase();
  const mes    = document.getElementById('merc-hist-mes')?.value||'';
  let lista = S.mercaderia.items.filter(i=>i.estado==='recibido');
  if(buscar) lista = lista.filter(i=>i.item.toLowerCase().includes(buscar)||i.proveedor.toLowerCase().includes(buscar));
  if(mes)    lista = lista.filter(i=>(i.fRecibido||i.fpedido||'').startsWith(mes));
  lista.sort((a,b)=>(b.fRecibido||b.fpedido||'').localeCompare(a.fRecibido||a.fpedido||''));
  const bd=document.getElementById('merc-hist-badge'); if(bd) bd.textContent=lista.length;
  const el=document.getElementById('merc-hist-lista'); if(!el) return;
  if(!lista.length){ el.innerHTML='<div class="empty">Sin ítems recibidos'+(buscar||mes?' en este filtro':'')+'.</div>'; return; }

  // Agrupar por proveedor en historial
  const grupos = {};
  lista.forEach(i=>{ if(!grupos[i.proveedor]) grupos[i.proveedor]=[]; grupos[i.proveedor].push(i); });

  el.innerHTML = Object.keys(grupos).sort().map(prov => {
    const items = grupos[prov];
    return '<div style="margin-bottom:16px">' +
      '<div style="background:var(--gray-mid);padding:8px 14px;border-radius:4px 4px 0 0;font-weight:700;font-size:13px">🏭 '+prov+'</div>' +
      '<div style="border:1px solid var(--gray-mid);border-top:none;border-radius:0 0 4px 4px">' +
        items.map((it,idx)=>'<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;background:'+(idx%2===0?'#fff':'#fafafa')+';border-bottom:1px solid #f5f5f5;flex-wrap:wrap">' +
          '<div style="flex:1"><div style="font-weight:600;font-size:13px">'+it.item+'</div>' +
            '<div style="font-size:11px;color:#888;margin-top:2px;display:flex;gap:10px;flex-wrap:wrap">' +
              '<span>📦 '+it.cantidad+' '+it.unidad+'</span>' +
              (it.fpedido?'<span>📅 Pedido: '+fmtF(it.fpedido)+'</span>':'') +
              (it.fRecibido?'<span>✅ Recibido: '+fmtF(it.fRecibido)+'</span>':'') +
              (it.obs?'<span>💬 '+it.obs+'</span>':'') +
            '</div>' +
          '</div>' +
          '<div style="display:flex;gap:6px">' +
            '<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;background:#e6f4ea;color:var(--green)">✅ Recibido</span>' +
            '<button class="btn-s" onclick="merc_setEstado('+it.id+',\'pendiente\')" style="font-size:11px;padding:4px 10px" title="Reactivar">↩ Reactivar</button>' +
            '<button class="btn-s btn-del" onclick="merc_del('+it.id+')" style="font-size:11px;padding:4px 8px" title="Eliminar">🗑</button>' +
          '</div>' +
        '</div>').join('') +
      '</div></div>';
  }).join('');
};

function cont_dlUpdate() {
  // Actualizar todos los datalists de clientes
  const clientes = S.contactos.clientes.map(c=>c.nombre).sort();
  const provs    = S.contactos.proveedores.map(p=>p.nombre).sort();
  // Clientes
  document.querySelectorAll('.dl-clientes').forEach(dl => {
    dl.innerHTML = clientes.map(n=>`<option value="${n}">`).join('');
  });
  // Proveedores
  document.querySelectorAll('.dl-proveedores').forEach(dl => {
    dl.innerHTML = provs.map(n=>`<option value="${n}">`).join('');
  });
  // p-dl (proveedores en pagos)
  const pdl = document.getElementById('p-dl');
  if(pdl) pdl.innerHTML = [...new Set([...provs, ...S.proveedores.pagos.map(p=>p.proveedor)])].sort().map(n=>`<option value="${n}">`).join('');
  // i-dl (clientes en ingresos)
  const idl = document.getElementById('i-dl');
  if(idl) idl.innerHTML = [...new Set([...clientes, ...S.ingresos.items.map(i=>i.origen)])].sort().map(n=>`<option value="${n}">`).join('');
  // iva proveedores
  const ivdl = document.getElementById('iva-prov-dl');
  if(ivdl) ivdl.innerHTML = [...new Set([...provs, ...S.iva.compras.map(c=>c.proveedor)])].sort().map(n=>`<option value="${n}">`).join('');
}

window.cont_agregarCliente = async function() {
  const nombre = document.getElementById('cl-nuevo-nombre').value.trim();
  if(!nombre){alert('Ingresá el nombre');return;}
  if(S.contactos.clientes.find(c=>c.nombre.toLowerCase()===nombre.toLowerCase())){
    alert('Ya existe ese cliente.');return;
  }
  S.contactos.clientes.push({id:Date.now(), nombre});
  S.contactos.clientes.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  await save('contactos');
  document.getElementById('cl-nuevo-nombre').value='';
  cont_renderClientes(); cont_dlUpdate();
};

window.cont_agregarProv = async function() {
  const nombre = document.getElementById('pv-nuevo-nombre').value.trim();
  if(!nombre){alert('Ingresá el nombre');return;}
  if(S.contactos.proveedores.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase())){
    alert('Ya existe ese proveedor.');return;
  }
  S.contactos.proveedores.push({id:Date.now(), nombre});
  S.contactos.proveedores.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  await save('contactos');
  document.getElementById('pv-nuevo-nombre').value='';
  cont_renderProvs(); cont_dlUpdate();
};

window.cont_delCliente = async function(id) {
  if(!isAdmin()){alert('Solo admin puede eliminar.');return;}
  if(!confirm('¿Eliminás este cliente?'))return;
  S.contactos.clientes = S.contactos.clientes.filter(c=>c.id!==id);
  await save('contactos'); cont_renderClientes(); cont_dlUpdate();
};

window.cont_delProv = async function(id) {
  if(!isAdmin()){alert('Solo admin puede eliminar.');return;}
  if(!confirm('¿Eliminás este proveedor?'))return;
  S.contactos.proveedores = S.contactos.proveedores.filter(p=>p.id!==id);
  await save('contactos'); cont_renderProvs(); cont_dlUpdate();
};

function cont_renderClientes() {
  const buscar = (document.getElementById('cl-buscar')?.value||'').toLowerCase();
  let lista = S.contactos.clientes;
  if(buscar) lista = lista.filter(c=>c.nombre.toLowerCase().includes(buscar));
  const bd = document.getElementById('cl-badge');
  if(bd) bd.textContent = S.contactos.clientes.length;
  const el = document.getElementById('cl-lista');if(!el)return;
  if(!lista.length){el.innerHTML='<div class="empty">'+(buscar?'Sin resultados.':'No hay clientes cargados. Agregá uno arriba.')+'</div>';return;}
  el.innerHTML = lista.map(c=>`
    <div class="item" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px">

let ivaEditTipoAct = 'Ticket';
window.iva_editarV = function(id) {
  const v = S.iva.ventas.find(x=>x.id===id); if(!v) return;
  document.getElementById('iva-v-edit-id').value = id;
  document.getElementById('iva-v-edit-fecha').value = v.fecha || '';
  document.getElementById('iva-v-edit-monto').value = v.monto || 0;
  document.getElementById('iva-v-edit-iva').value = v.iva || '';
  document.getElementById('iva-v-edit-num').value = v.numero || '';
  ivaEditTipoAct = v.tipo || 'Ticket';
  // Marcar botón activo
  ['Ticket','Factura A','Factura B','Factura C'].forEach(t => {
    const map = {'Ticket':'ticket','Factura A':'factA','Factura B':'factB','Factura C':'factC'};
    const btn = document.getElementById('ive-btn-'+map[t]);
    if(btn) btn.classList.toggle('active', t === ivaEditTipoAct);
  });
  document.getElementById('iva-v-modal').classList.add('open');
};
window.ivaEditTipo = function(t, btn) {
  ivaEditTipoAct = t;
  document.querySelectorAll('#iva-v-modal .tv-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
};
window.ivaEditCalc = function() {
  const m = parseFloat(document.getElementById('iva-v-edit-monto').value)||0;
  const a = parseFloat(document.getElementById('iva-v-edit-alic').value)||0;
  if(a>0) { const el=document.getElementById('iva-v-edit-iva'); if(el) el.value=Math.round((m/(1+a))*a*100)/100||''; }
};
window.iva_guardarEdit = async function() {
  const id = parseInt(document.getElementById('iva-v-edit-id').value);
  const v = S.iva.ventas.find(x=>x.id===id); if(!v){alert('Error');return;}
  const fecha = document.getElementById('iva-v-edit-fecha').value;
  const monto = parseFloat(document.getElementById('iva-v-edit-monto').value)||0;
  const iva   = parseFloat(document.getElementById('iva-v-edit-iva').value)||0;
  if(!fecha){alert('Ingresá la fecha');return;}
  if(monto===0&&iva===0){alert('Ingresá al menos el monto o el IVA');return;}
  v.fecha  = fecha;
  v.tipo   = ivaEditTipoAct;
  v.monto  = monto;
  v.iva    = iva;
  v.numero = document.getElementById('iva-v-edit-num').value.trim();
  S.iva.ventas.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  await save('iva');
  cerrarModal('iva-v-modal');
  iva_renderV(); iva_renderRes();
};

      <div class="fg"><label>Cliente</label><input type="text" id="ped-edit-cliente" list="ped-edit-cl-dl"/><datalist id="ped-edit-cl-dl" class="dl-clientes"></datalist></div>
      <div class="fg"><label>¿Está en stock?</label><select id="ped-edit-stock">
        <option value="si">✅ Sí, está en stock</option>
        <option value="no">❌ No, hay que pedirlo</option>
      </select></div>
      <div class="fg" style="grid-column:1/-1"><label>Descripción del pedido</label>
        <textarea id="ped-edit-desc" rows="4" style="width:100%;padding:8px 10px;border:1px solid var(--gray-mid);border-radius:3px;font-size:13px;background:#fafafa;font-family:Montserrat,sans-serif;resize:vertical;line-height:1.5"></textarea>
      </div>
      <div class="fg"><label>Proveedor</label><input type="text" id="ped-edit-prov" list="ped-edit-pv-dl"/><datalist id="ped-edit-pv-dl" class="dl-proveedores"></datalist></div>
      <div class="fg"><label>Fecha estimada proveedor</label><input type="date" id="ped-edit-fprov"/></div>
      <div class="fg"><label>Fecha estimada cliente</label><input type="date" id="ped-edit-fcli"/></div>
      <div class="fg" style="grid-column:1/-1"><label>Observaciones</label><input type="text" id="ped-edit-obs"/></div>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#555;margin-bottom:8px">Estado:</div>
      <div class="estado-selector" id="ped-edit-estado"></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-p" style="flex:1" onclick="ped_guardarEdit()">Guardar cambios</button>
      <button class="btn-s" onclick="cerrarModal('ped-modal')">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="app-toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</body>
</html>
