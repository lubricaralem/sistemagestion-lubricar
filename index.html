<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lubricar Alem — Gestión</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A43D;
  --gold-light:#e8c86a;
  --gold-dark:#a8842a;
  --black:#0D0D0D;
  --black2:#2B2B2B;
  --gray-light:#F5F5F5;
  --gray-mid:#D9D9D9;
  --white:#FFFFFF;
  --green:#1e8e3e;
  --red:#d93025;
  --blue:#1a73e8;
  --orange:#e37400;
}
body{font-family:'Montserrat',Arial,sans-serif;font-size:14px;color:var(--black);background:var(--gray-light);min-height:100vh}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--black)}
.login-box{background:#fff;border-radius:4px;padding:44px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5);border-top:4px solid var(--gold)}
.login-logo{max-width:240px;width:85%;margin:0 auto 28px;display:block}
.login-title{font-size:12px;color:#888;margin-bottom:32px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.google-btn{width:100%;padding:13px 16px;border:2px solid var(--black);border-radius:4px;background:#fff;cursor:pointer;font-size:14px;font-weight:700;font-family:Montserrat,sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:.15s}
.google-btn:hover{background:var(--gold);border-color:var(--gold);color:#fff}
.google-btn svg{flex-shrink:0}
.login-err{color:#d93025;font-size:13px;margin-top:14px;display:none;padding:10px;background:#fce8e6;border-radius:6px}
.login-err.show{display:block}
.login-info{font-size:12px;color:#bbb;margin-top:20px;line-height:1.5}

/* ── APP SHELL ── */
.app{display:none;flex-direction:column;min-height:100vh}
.app.visible{display:flex}

/* ── TOPBAR ── */
.topbar{background:var(--black);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:3px solid var(--gold)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{height:38px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-user{font-size:12px;color:#aaa;display:flex;align-items:center;gap:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid #444}
.user-name{color:#ddd;font-weight:600;font-size:13px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase}
.role-admin{background:var(--gold);color:var(--black)}
.role-user{background:#444;color:#ccc}
.btn-topbar{padding:6px 12px;font-size:11px;border:1px solid #555;border-radius:3px;cursor:pointer;background:transparent;color:#ccc;white-space:nowrap;font-family:Montserrat,sans-serif;font-weight:600;letter-spacing:.5px}
.btn-topbar:hover{background:var(--gold);border-color:var(--gold);color:#fff}

/* ── MENÚ PRINCIPAL (tarjetas) ── */
.main-menu{padding:28px 24px;flex:1;background:var(--gray-light)}
.menu-welcome{font-size:12px;color:#888;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.menu-title{font-size:28px;font-weight:700;color:var(--black);margin-bottom:24px;font-family:"Anton",sans-serif;letter-spacing:.5px}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;max-width:1100px}
.menu-card{background:#fff;border-radius:4px;padding:28px 22px;cursor:pointer;border:2px solid transparent;border-left:4px solid var(--gray-mid);transition:.18s;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden}
.menu-card:hover{border-color:var(--gold);border-left-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,164,61,.2)}
.menu-card.active{border-color:var(--gold);border-left-color:var(--gold);background:#fffbf0}
.menu-card-icon{font-size:28px;line-height:1}
.menu-card-title{font-size:15px;font-weight:700;color:var(--black);font-family:Montserrat,sans-serif;letter-spacing:0}
.menu-card-desc{font-size:11px;color:#999;line-height:1.4;font-weight:500}
.menu-card-alert{position:absolute;top:12px;right:12px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;min-width:22px;text-align:center}

/* ── MODULE VIEW ── */
.module-view{display:none;flex-direction:column;flex:1;min-height:0}
.module-view.visible{display:flex}
.mod-header{background:var(--black);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:3px solid var(--gold)}
.mod-back{width:34px;height:34px;border-radius:3px;border:1px solid #555;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#ccc}
.mod-back:hover{background:var(--gold);border-color:var(--gold);color:#fff}
.mod-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;font-family:"Anton",sans-serif;letter-spacing:.5px;color:#fff}
.mod-icon{font-size:20px;color:var(--gold)}
.mod-content{padding:1rem;flex:1;overflow-y:auto;max-width:1300px;width:100%;margin:0 auto}

/* ── COMPONENTES ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.card{background:#fff;border-radius:4px;padding:14px 16px;border:1px solid var(--gray-mid);border-top:3px solid var(--gray-mid)}
.card-label{font-size:10px;color:#888;margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.card-value{font-size:18px;font-weight:700;font-family:Montserrat,sans-serif}
.cv-green{color:var(--green)}.cv-red{color:var(--red)}.cv-yellow{color:var(--gold)}.cv-blue{color:var(--blue)}.cv-purple{color:#7b1fa2}.cv-gold{color:var(--gold)}
.section{background:#fff;border:1px solid var(--gray-mid);border-radius:4px;padding:1.1rem 1.25rem;margin-bottom:1rem;border-top:3px solid var(--gold)}
.sec-title{font-size:13px;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px;color:var(--black);text-transform:uppercase;letter-spacing:.5px;font-family:Montserrat,sans-serif}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.b-green{background:#e6f4ea;color:#1e8e3e}.b-red{background:#fce8e6;color:#d93025}
.b-yellow{background:#fef7e0;color:var(--gold-dark)}.b-blue{background:#e8f0fe;color:#1a73e8}
.b-purple{background:#f3e8fd;color:#7b1fa2}.b-teal{background:#e0f5f1;color:#0d7a5f}.b-gray{background:#f1f1f1;color:#666}
.b-gold{background:#fdf3d6;color:var(--gold-dark);border:1px solid var(--gold-light)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:.3px;font-family:Montserrat,sans-serif}
.fg input,.fg select{width:100%;padding:8px 10px;border:1px solid var(--gray-mid);border-radius:3px;font-size:13px;background:#fafafa;font-family:Montserrat,sans-serif}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--gold);background:#fff;box-shadow:0 0 0 2px rgba(201,164,61,.15)}
.btn-p{background:var(--gold);color:var(--black);border:none;padding:9px 18px;border-radius:3px;cursor:pointer;font-size:12px;font-weight:700;font-family:Montserrat,sans-serif;text-transform:uppercase;letter-spacing:.5px}
.btn-p:hover{background:var(--gold-dark);color:#fff}
.btn-s{padding:5px 11px;font-size:11px;border-radius:3px;cursor:pointer;border:1px solid var(--gray-mid);background:#f5f5f5;color:#555;font-family:Montserrat,sans-serif;font-weight:600}
.btn-del{border-color:#fca9a9;color:#d93025;background:#fff5f5}
.tab-row{display:flex;gap:0;margin-bottom:1.5rem;border:1px solid var(--gray-mid);border-radius:3px;overflow:hidden;flex-wrap:wrap}
.tab{flex:1;padding:9px 6px;text-align:center;font-size:11px;cursor:pointer;background:#fff;border:none;color:#666;min-width:80px;font-weight:700;font-family:Montserrat,sans-serif;text-transform:uppercase;letter-spacing:.3px}
.tab.active{background:var(--black);color:var(--gold)}
.panel{display:none}.panel.active{display:block}
.item{border:1px solid var(--gray-mid);border-radius:4px;padding:13px;margin-bottom:8px;background:#fff;border-left:3px solid var(--gray-mid)}
.item.al-hoy{border-color:var(--red);border-left-color:var(--red);background:#fff5f5}
.item.al-man{border-color:var(--gold);border-left-color:var(--gold);background:#fffdf0}
.item.done{opacity:.5;background:#fafafa}
.item-h{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.item-name{font-weight:700;font-size:14px;font-family:Montserrat,sans-serif}
.item-amt{font-size:15px;font-weight:700}
.item-meta{font-size:12px;color:#888;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.item-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.fb{padding:5px 12px;font-size:11px;border-radius:3px;cursor:pointer;border:1px solid var(--gray-mid);background:#fff;color:#666;font-weight:600;font-family:Montserrat,sans-serif}
.fb.active{background:var(--gold);color:var(--black);border-color:var(--gold)}
.empty{text-align:center;color:#bbb;padding:2.5rem;font-size:13px}
.mes-h{font-size:11px;font-weight:700;color:#999;padding:6px 0;margin-top:4px;border-bottom:1px solid #eee;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.alert-box{border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;display:none}
.alert-box.show{display:block}
.alert-danger{background:#fce8e6;border:1px solid #f5c6c3;color:#c62828}
.alert-info{background:#e8f0fe;border:1px solid #c5d9fb;color:#1557b0}
.neto-box{background:var(--gray-light);border-radius:3px;padding:12px 14px;margin-bottom:12px;border:1px solid var(--gray-mid);border-left:4px solid var(--gold)}
.cond{display:none}.cond.vis{display:flex;flex-direction:column;gap:4px}
.tipo-sel{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.tipo-btn{padding:11px 6px;text-align:center;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-size:12px;color:#666;background:#fff;font-weight:600}
.tipo-btn.active{border-color:var(--gold);background:var(--gold);color:var(--black);font-weight:700}
.tipo-icon{font-size:17px;display:block;margin-bottom:3px}
.echeq-info-box{background:#e8f0fe;border:1px solid #c5d9fb;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#1557b0;display:none}
.echeq-info-box.vis{display:block}
/* IVA */
.iva-resumen{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1.5rem}
.iva-box{background:#fff;border:1px solid var(--gray-mid);border-radius:4px;padding:16px;text-align:center}
.iva-box-title{font-size:11px;color:#888;margin-bottom:6px;font-weight:700;text-transform:uppercase}
.iva-box-val{font-size:22px;font-weight:700}
.iva-box-sub{font-size:11px;color:#aaa;margin-top:4px}
.iva-box.credito{border-color:#c8e0fb;background:#f0f7ff}
.iva-box.debito{border-color:#fce8e6;background:#fff5f5}
.iva-box.saldo.positivo{border-color:#fce8e6;background:#fff5f5}
.iva-box.saldo.negativo{border-color:#b7dfca;background:#e6f4ea}
.iva-tabla{width:100%;border-collapse:collapse;font-size:13px}
.iva-tabla th{background:#f8f8f8;padding:8px 10px;text-align:right;font-size:11px;font-weight:700;color:#666;border-bottom:2px solid #eee}
.iva-tabla th:first-child{text-align:left}
.iva-tabla td{padding:7px 10px;border-bottom:1px solid #f5f5f5;text-align:right}
.iva-tabla td:first-child{text-align:left}
.iva-tabla tfoot td{font-weight:700;border-top:2px solid #e0e0e0;background:#f8f8f8;border-bottom:none}
.tipo-venta-sel{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.tv-btn{padding:9px 4px;text-align:center;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:12px;color:#666;background:#fff;font-weight:600}
.tv-btn.active{border-color:var(--gold);background:var(--gold);color:var(--black);font-weight:700}
/* Sueldos */
.emp-card{border:1px solid #e8e8e8;border-radius:10px;padding:14px;margin-bottom:10px;background:#fff}
.emp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.emp-nombre{font-weight:700;font-size:15px}
.sueldo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.sf{display:flex;flex-direction:column;gap:3px}
.sf label{font-size:11px;color:#888;font-weight:700}
.sf input{padding:7px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.sueldo-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
/* Dashboard */
.dash-bloque{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem}
.dash-col{background:#fff;border:1px solid var(--gray-mid);border-radius:4px;padding:16px;border-top:3px solid var(--gold)}
.dash-col-title{font-size:10px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:10px;letter-spacing:.8px;font-family:Montserrat,sans-serif}
.dash-fila{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.dash-fila:last-child{border:none;font-weight:700;font-size:14px;padding-top:8px}
.dash-fila.sub{color:#aaa;font-size:12px}
.dash-card{background:#fff;border:1px solid var(--gray-mid);border-radius:4px;padding:16px}
.dash-card-title{font-size:10px;color:#888;margin-bottom:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;font-family:Montserrat,sans-serif}
.dash-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f0f0f0}
.dash-row:last-child{border:none;font-weight:700}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-bottom:1rem}
.bar-wrap{margin-bottom:7px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;color:#555}
.bar-track{height:6px;background:#eee;border-radius:3px}
.bar-fill{height:6px;border-radius:3px}
/* Usuarios */
.user-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px}
.user-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:16px}
.user-card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.user-card-name{font-weight:700;font-size:15px}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.perm-item{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.perm-item input{width:auto}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:4px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;margin:16px;border-top:4px solid var(--gold)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;font-family:Montserrat,sans-serif;letter-spacing:0;text-transform:none}
.modal-close{cursor:pointer;font-size:22px;color:#aaa;border:none;background:none;line-height:1}
/* Loading */
.loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;color:#fff;gap:16px}
.loading-screen.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid #444;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Echeq imp badge */
.ech-imp{background:#fff8e1;color:#b06000;border:1px solid #ffe082;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
/* Responsive */
@media(max-width:768px){
  .topbar{padding:0 12px}
  .topbar-logo{height:30px}
  .user-name{max-width:90px}
  .main-menu{padding:18px 14px}
  .menu-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .menu-card{padding:20px 16px;gap:8px}
  .menu-card-icon{font-size:26px}
  .menu-card-title{font-size:14px}
  .menu-card-desc{display:none}
  .mod-content{padding:.75rem}
  .cards{grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:7px}
  .form-grid{grid-template-columns:1fr 1fr;gap:8px}
  .tab-row{flex-wrap:nowrap;overflow-x:auto}
  .tab{min-width:70px;font-size:11px;padding:8px 3px}
  .dash-bloque{grid-template-columns:1fr}
  .iva-resumen{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr}
  .user-grid{grid-template-columns:1fr}
  .tipo-venta-sel{grid-template-columns:repeat(2,1fr)}
  .btn-topbar span{display:none}
  .sueldo-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:420px){
  .menu-grid{grid-template-columns:1fr 1fr}
  .cards{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
}

/* ── PEDIDOS ── */
.pedido-card{background:#fff;border-radius:6px;padding:14px;margin-bottom:0;border:1px solid var(--gray-mid);border-top:4px solid var(--gray-mid);transition:.2s;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.pedido-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.pedido-card.st-pedido{border-top-color:#1a73e8}
.pedido-card.st-preparar{border-top-color:#e37400}
.pedido-card.st-espera{border-top-color:#7b1fa2}
.pedido-card.st-listo{border-top-color:var(--gold)}
.pedido-card.st-retirado{border-top-color:var(--green);opacity:.7}
.pedido-estado{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:3px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;font-family:Montserrat,sans-serif}
.pe-pedido{background:#e8f0fe;color:#1a73e8}
.pe-preparar{background:#fef7e0;color:#b06000}
.pe-espera{background:#f3e8fd;color:#7b1fa2}
.pe-listo{background:#fdf3d6;color:var(--gold-dark);border:1px solid var(--gold-light)}
.pe-retirado{background:#e6f4ea;color:var(--green)}
.pedido-nombre{font-size:15px;font-weight:700;font-family:Montserrat,sans-serif;letter-spacing:0}
.pedido-meta{font-size:12px;color:#888;display:flex;gap:12px;flex-wrap:wrap;margin:6px 0}
.pedido-stock{font-size:11px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:3px}
.stock-si{background:#e6f4ea;color:var(--green)}
.stock-no{background:#fce8e6;color:var(--red)}
.estado-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.es-btn{padding:12px 8px;text-align:center;border:2px solid var(--gray-mid);border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:Montserrat,sans-serif;text-transform:uppercase;letter-spacing:.3px;background:#fff;color:#666;line-height:1.4;transition:.15s;min-width:90px}
.es-btn.active-pedido{border-color:#1a73e8;background:#e8f0fe;color:#1a73e8}
.es-btn.active-preparar{border-color:#e37400;background:#fef7e0;color:#b06000}
.es-btn.active-espera{border-color:#7b1fa2;background:#f3e8fd;color:#7b1fa2}
.es-btn.active-listo{border-color:var(--gold);background:#fdf3d6;color:var(--gold-dark)}
.es-btn.active-retirado{border-color:var(--green);background:#e6f4ea;color:var(--green)}
.es-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.12)}

/* ── BATERÍAS ── */
.bat-card{background:#fff;border-radius:6px;padding:14px;margin-bottom:0;border:1px solid var(--gray-mid);border-top:4px solid var(--gray-mid);transition:.2s;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.bat-card.gar-activa{border-top-color:var(--green)}
.bat-card.gar-pronto{border-top-color:var(--gold)}
.bat-card.gar-vencida{border-top-color:#aaa}
.bat-card.gar-devolucion{border-top-color:#7b1fa2}
 .bat-card.gar-reconocida{border-top-color:var(--green)}
.bat-card.gar-rechazada{border-top-color:var(--red)}
.bat-estado{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:3px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;font-family:Montserrat,sans-serif}
.be-activa{background:#e6f4ea;color:var(--green)}
.be-pronto{background:#fdf3d6;color:var(--gold-dark);border:1px solid var(--gold-light)}
.be-vencida{background:#f1f1f1;color:#666}
.be-devolucion{background:#f3e8fd;color:#7b1fa2}
.be-reconocida{background:#e6f4ea;color:var(--green)}
.be-rechazada{background:#fce8e6;color:var(--red)}
.bat-modelo{font-size:15px;font-weight:700;font-family:Montserrat,sans-serif;letter-spacing:0}
.bat-meta{font-size:12px;color:#888;display:flex;gap:14px;flex-wrap:wrap;margin:6px 0}
.gar-bar-wrap{margin:10px 0 4px}
.gar-bar-track{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.gar-bar-fill{height:8px;border-radius:4px;transition:.3s}
.devolucion-panel{background:var(--gray-light);border-radius:4px;padding:14px;margin-top:12px;border:1px solid var(--gray-mid);border-left:4px solid #7b1fa2}
.devolucion-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#7b1fa2;margin-bottom:10px}
.resolucion-sel{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.res-btn{padding:7px 14px;border:2px solid var(--gray-mid);border-radius:3px;cursor:pointer;font-size:11px;font-weight:700;font-family:Montserrat,sans-serif;text-transform:uppercase;background:#fff;color:#666;transition:.15s}
.res-btn.act-pendiente{border-color:#888;background:#f1f1f1;color:#555}
.res-btn.act-reconocida{border-color:var(--green);background:#e6f4ea;color:var(--green)}
.res-btn.act-rechazada{border-color:var(--red);background:#fce8e6;color:var(--red)}


/* ── KANBAN GRID ── */
.kanban-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:start}
@media(max-width:900px){.kanban-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kanban-grid{grid-template-columns:1fr}}
/* Dentro de cada columna las cards fluyen normalmente */
.kanban-grid > div{display:flex;flex-direction:column;gap:12px}
/* Ajustes de card en kanban */
.pedido-card{padding:14px;margin-bottom:0}
.bat-card{padding:14px;margin-bottom:0}
/* Botones de estado más compactos */
.es-btn{padding:6px 2px;min-width:0;font-size:9px;letter-spacing:0;border-radius:4px;flex:1;text-align:center;line-height:1.2}


/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--black);color:#fff;padding:10px 18px;border-radius:4px;font-size:13px;font-family:'Montserrat',sans-serif;font-weight:600;z-index:9999;display:none;align-items:center;gap:8px;border-left:4px solid var(--gold);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.toast.show{display:flex}
.toast.error{border-left-color:var(--red)}

</style>
</head>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#aaa">Iniciando sistema...</div>
</div>

<!-- LOGIN -->
<div class="login-screen" id="login-screen" style="display:none">

    <div class="login-info">Solo usuarios autorizados por el administrador pueden acceder.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-family:Montserrat,sans-serif;font-weight:700;color:var(--gold);font-size:14px;letter-spacing:.5px;text-transform:uppercase">Lubricar Alem</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <img class="user-avatar" id="user-avatar" src="" alt=""/>
        <span class="user-name" id="user-name"></span>
        <span class="role-badge" id="role-badge"></span>
      </div>
      <button class="btn-topbar" onclick="exportarDatos()">⬇ <span>Exportar</span></button>
      <button class="btn-topbar" onclick="document.getElementById('import-file').click()">⬆ <span>Importar</span></button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importarDatos(this)"/>
      <button class="btn-topbar" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- MENÚ PRINCIPAL -->
  <div class="main-menu" id="main-menu">
    <!-- BRAND HEADER -->
    <div style="background:var(--black);margin:-28px -24px 28px -24px;padding:28px 32px 24px;border-bottom:4px solid var(--gold);display:flex;align-items:center;gap:28px;flex-wrap:wrap">
      <img id="menu-logo" src="" alt="Lubricar Alem" style="height:80px;filter:brightness(0) invert(1)"/>
      <div>
        <div class="menu-welcome" id="menu-welcome" style="color:var(--gold-light);margin-bottom:4px"></div>
        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:26px;color:#fff;letter-spacing:.5px">¿QUÉ QUERÉS GESTIONAR?</div>
      </div>
    </div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <!-- MODULE VIEW -->
  <div class="module-view" id="module-view">
    <div class="mod-header">
      <button class="mod-back" onclick="volverMenu()">←</button>
      <span class="mod-icon" id="mod-icon"></span>
      <span class="mod-title" id="mod-title"></span>
    </div>
    <div class="mod-content" id="mod-content">
      <!-- se renderiza dinámicamente -->
    </div>
  </div>
</div>

<!-- MODAL ECHEQ EDIT -->
<div class="modal-overlay" id="ech-modal">
  <div class="modal-box">
    <div class="modal-title">Editar echeq <button class="modal-close" onclick="cerrarModal('ech-modal')">✕</button></div>
    <input type="hidden" id="ech-edit-id"/>
    <div class="form-grid">
      <div class="fg"><label>Beneficiario</label><input type="text" id="ech-edit-benef" list="ech-benef-dl"/><datalist id="ech-benef-dl"></datalist></div>
      <div class="fg"><label>Monto nominal ($)</label><input type="number" id="ech-edit-monto" step="0.01" oninput="ech_editCalc()"/></div>
      <div class="fg"><label>Impuesto 0,6% ($)</label><input type="number" id="ech-edit-imp" readonly style="background:#f8f8f8;color:#888"/></div>
      <div class="fg"><label>Total ($)</label><input type="number" id="ech-edit-total" readonly style="background:#f0f7ff;font-weight:700"/></div>
      <div class="fg"><label>Fecha de cobro</label><input type="date" id="ech-edit-fecha"/></div>
      <div class="fg"><label>N° echeq</label><input type="text" id="ech-edit-num"/></div>
      <div class="fg" style="grid-column:1/-1"><label>Concepto</label><input type="text" id="ech-edit-conc"/></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-p" style="flex:1" onclick="ech_guardarEdit()">Guardar cambios</button>
      <button class="btn-s" onclick="cerrarModal('ech-modal')">Cancelar</button>
    </div>
  </div>
</div>

async function fbGet(mod) {
  const snap = await getDoc(doc(db, 'gestion', mod));
  return snap.exists() ? snap.data().value : null;
}
async function fbSet(mod, value) {
  await setDoc(doc(db, 'gestion', mod), { value });
}

let toastTimer = null;
function showToast(msg, isError=false) {
  const t = document.getElementById('app-toast');
  if(!t) return;
  t.textContent = msg;
  t.className = 'toast show' + (isError?' error':'');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.classList.remove('show'); }, 2500);
}

async function save(mod, retries=3) {
  for(let attempt=1; attempt<=retries; attempt++) {
    try {
      await setDoc(doc(db, 'gestion', mod), { value: S[mod] });
      return; // success
    } catch(e) {
      console.error('Save attempt '+attempt+' failed for '+mod+':', e);
      if(attempt === retries) {
        alert('⚠ Error al guardar en Firebase ('+mod+'). Verificá tu conexión y volvé a intentarlo.');
        throw e;
      }
      await new Promise(r => setTimeout(r, 800 * attempt)); // wait before retry
    }
  }
}
async function loadAll() {
  const mods = ['echeqs','caja','proveedores','ingresos','iva','sueldos','impuestos','usuarios','contactos','pedidos','baterias','mercaderia'];
  const defaults = {
    echeqs:     { saldo: 0, saldoFecha: null, items: [] },
    caja:       { cierres: [] },
    proveedores:{ pagos: [] },
    ingresos:   { items: [] },
    iva:        { ventas: [], compras: [] },
    sueldos:    { empleados: [], pagos: [], extras_generales: [] },
    impuestos:  { pagos: [] },
    usuarios:   { lista: [] },
    contactos:  { clientes: [], proveedores: [] },
    pedidos:    { items: [] },
    baterias:   { items: [] },
    mercaderia:  { items: [] }
  };
  for (const m of mods) {
    const d = await fbGet(m);
    S[m] = d || defaults[m];
  }
}

window.loginGoogle = async function() {
  try {
    const result = await signInWithPopup(auth, provider);
    // onAuthStateChanged handles the rest
  } catch(e) {
    document.getElementById('login-err').classList.add('show');
    document.getElementById('login-err').textContent = 'Error al iniciar sesión: ' + e.message;
  }
};

window.doLogout = async function() {
  await signOut(auth);
  currentUser = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
};

onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading-screen').classList.add('hidden');
  if (!user) {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
    return;
  }
  // Load all data first
  showLoading('Cargando datos...');
  await loadAll();
  hideLoading();

  // Find user by email
  const email = user.email;
  const uRec = S.usuarios.lista.find(u =>
    (u.email && u.email.toLowerCase() === email.toLowerCase()) ||
    (u.user && email.toLowerCase().startsWith(u.user.toLowerCase()))
  );
  if (!uRec && S.usuarios.lista.length > 0) {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-err').classList.add('show');
    document.getElementById('login-err').textContent = 'No tenés acceso. Email: ' + email;
    await signOut(auth);
    return;
  }
  // If no users configured yet, first login becomes admin
  if (S.usuarios.lista.length === 0) {
    const newAdmin = { id: Date.now(), nombre: user.displayName || email, user: email.split('@')[0], email, rol: 'admin', pestanas: ['dashboard','echeqs','caja','proveedores','ingresos','iva','sueldos','impuestos','pedidos','baterias','mercaderia','contactos','usuarios'] };
    S.usuarios.lista.push(newAdmin);
    await save('usuarios');
    currentUser = { ...newAdmin, name: user.displayName || email, photo: user.photoURL };
  } else {
    currentUser = { ...(uRec || {}), name: user.displayName || email, photo: user.photoURL, email };
  }

  // UI
  document.getElementById('user-name').textContent = currentUser.name || currentUser.nombre;
  const av = document.getElementById('user-avatar');
  if (currentUser.photo) av.src = currentUser.photo; else av.style.display='none';
  const rb = document.getElementById('role-badge');
  rb.textContent = currentUser.rol === 'admin' ? 'Admin' : 'Usuario';
  rb.className = 'role-badge ' + (currentUser.rol === 'admin' ? 'role-admin' : 'role-user');
  const hour = new Date().getHours();
  const saludo = hour < 12 ? 'Buenos días' : hour < 19 ? 'Buenas tardes' : 'Buenas noches';
  document.getElementById('menu-welcome').textContent = saludo + ', ' + (currentUser.nombre || currentUser.name) + ' 👋';

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  buildMenu();
});

function showLoading(msg) {
  const ls = document.getElementById('loading-screen');
  ls.querySelector('div:last-child').textContent = msg || 'Cargando...';
  ls.classList.remove('hidden');
}
function hideLoading() {
  document.getElementById('loading-screen').classList.add('hidden');
}

function fmt(n){return '$'+Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtF(f){if(!f)return'—';const p=f.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtP(p){if(!p)return'—';const s=p.split('-');return cap(new Date(+s[0],+s[1]-1).toLocaleDateString('es-AR',{month:'long',year:'numeric'}));}
function hoy(){return new Date().toISOString().split('T')[0];}
function manana(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}
function mesPref(){return hoy().slice(0,7);}
function finSem(){const d=new Date();d.setDate(d.getDate()+(7-d.getDay()));return d.toISOString().split('T')[0];}
function vn(id){const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function nomMes(mc){const p=mc.split('-');return cap(new Date(+p[0],+p[1]-1).toLocaleDateString('es-AR',{month:'long',year:'numeric'}));}
function isAdmin(){return currentUser&&currentUser.rol==='admin';}
function canSee(mod){if(currentUser&&currentUser.rol==='admin')return true;return currentUser&&currentUser.pestanas&&currentUser.pestanas.includes(mod);}

window.exportarDatos = function() {
  const blob = new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='la_backup_'+hoy()+'.json'; a.click();
  URL.revokeObjectURL(url);
};
window.importarDatos = async function(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      showLoading('Importando datos...');
      const mods = ['echeqs','caja','proveedores','ingresos','iva','sueldos','impuestos','usuarios','contactos','pedidos','baterias','mercaderia'];
      for (const k of mods) { if(data[k]) { S[k]=data[k]; await save(k); } }
      hideLoading();
      buildMenu();
      if(modActual) abrirModulo(modActual);
      alert('✅ Datos importados correctamente.');
    } catch(err) { alert('Error al importar: '+err.message); hideLoading(); }
  };
  reader.readAsText(file); input.value='';
};

function getAlerts() {
  const h = hoy(), m = manana();
  const alerts = {};
  const echHoy = S.echeqs.items.filter(e=>!e.cobrado&&(e.fecha===h||e.fecha<h)).length;
  if(echHoy) alerts.echeqs = echHoy;
  const pvVenc = S.proveedores.pagos.filter(p=>p.estado!=='pagado'&&p.fechaVenc&&p.fechaVenc<=h).length;
  if(pvVenc) alerts.proveedores = pvVenc;
  const ingHoy = S.ingresos.items.filter(i=>i.estado!=='acreditado'&&i.fechaCobro&&(i.fechaCobro===h||i.fechaCobro<h)).length;
  if(ingHoy) alerts.ingresos = ingHoy;
  const impVenc = S.impuestos.pagos.filter(p=>p.estado!=='pagado'&&p.fvenc&&p.fvenc<=h).length;
  if(impVenc) alerts.impuestos = impVenc;
  // suma alertas para dashboard
  const total = echHoy + pvVenc + ingHoy + impVenc;
  if(total) alerts.dashboard = total;
  return alerts;
}

function buildMenu() {
  const alerts = getAlerts();
  const grid = document.getElementById('menu-grid');
  grid.innerHTML = '';
  MODULOS.forEach(m => {
    if(m.adminOnly && !isAdmin()) return;
    if(!m.adminOnly && !canSee(m.id)) return;
    const a = alerts[m.id];
    const card = document.createElement('div');
    card.className = 'menu-card';
    card.innerHTML = `
      <div class="menu-card-icon">${m.icon}</div>
      <div class="menu-card-title">${m.title}</div>
      <div class="menu-card-desc">${m.desc}</div>
      ${a ? `<div class="menu-card-alert">${a}</div>` : ''}`;
    card.addEventListener('click', () => abrirModulo(m.id));
    grid.appendChild(card);
  });
}

function abrirModulo(id) {
  modActual = id;
  const mod = MODULOS.find(m=>m.id===id);
  if(!mod) return;
  document.getElementById('main-menu').style.display = 'none';
  const mv = document.getElementById('module-view');
  mv.classList.add('visible');
  document.getElementById('mod-icon').textContent = mod.icon;
  document.getElementById('mod-title').textContent = mod.title;
  const mc = document.getElementById('mod-content');
  mc.innerHTML = '';
  // Render module
    const renders = {
    dashboard: renderDash, echeqs: renderEch, caja: renderCaja,
    proveedores: renderProv, ingresos: renderIng, iva: renderIva,
    sueldos: renderSueldos, impuestos: renderImp, usuarios: renderUsuarios,
    pedidos: renderPedidos, contactos: renderContactos, baterias: renderBaterias, mercaderia: renderMercaderia
  };
  if(renders[id]) renders[id]();
}

window.volverMenu = function() {
  document.getElementById('module-view').classList.remove('visible');
  document.getElementById('main-menu').style.display = '';
  modActual = null;
  buildMenu();
};

function setTab(panelId, btn, containerSel) {
  const container = document.querySelector(containerSel);
  container.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  container.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}
window.setTab = setTab;

window.cerrarModal = function(id) { document.getElementById(id).classList.remove('open'); };

window.dashRefresh = function() {
  const mes = document.getElementById('dash-mes')?.value || mesPref();
  const h = hoy();
  // Alertas
  const echAlH = S.echeqs.items.filter(e=>!e.cobrado&&(e.fecha===h||e.fecha<h));
  const echAlM = S.echeqs.items.filter(e=>!e.cobrado&&e.fecha===manana());
  const pvVenc = S.proveedores.pagos.filter(p=>p.estado!=='pagado'&&p.fechaVenc&&p.fechaVenc<=h);
  const impVenc = S.impuestos.pagos.filter(p=>p.estado!=='pagado'&&p.fvenc&&p.fvenc<=h);
  let msgs = [];
  if(echAlH.length) msgs.push('⚠ Echeqs a cobrar/vencidos hoy: '+echAlH.map(e=>e.beneficiario+' '+fmt(e.monto)).join(', '));
  if(echAlM.length) msgs.push('🔔 Echeqs cobran mañana: '+echAlM.map(e=>e.beneficiario+' '+fmt(e.monto)).join(', '));
  if(pvVenc.length) msgs.push('⚠ Proveedores vencidos: '+pvVenc.map(p=>p.proveedor).join(', '));
  if(impVenc.length) msgs.push('⚠ Impuestos vencidos: '+impVenc.map(p=>p.concepto).join(', '));
  const da = document.getElementById('dash-alertas');
  if(da) da.innerHTML = msgs.map(m=>`<div class="alert-box alert-danger show" style="margin-bottom:6px">${m}</div>`).join('');
  // Ingresos
  const cajMes = S.caja.cierres.filter(c=>c.fecha.startsWith(mes)).reduce((s,c)=>s+c.total,0);
  const ingMes = S.ingresos.items.filter(i=>i.estado==='acreditado'&&(i.fechaCobro||i.fechaRec).startsWith(mes)).reduce((s,i)=>s+i.monto,0);
  const totalIng = cajMes + ingMes;
  // Egresos (sin doble conteo: echeqs de proveedor ya están en provMes)
  const provMes = S.proveedores.pagos.filter(p=>p.estado==='pagado'&&p.fechaPago.startsWith(mes)).reduce((s,p)=>s+p.monto,0);
  const sueldosMes = S.sueldos.pagos.filter(p=>p.mes===mes).reduce((s,p)=>s+p.neto,0);
  const insumosMes = (S.sueldos.extras_generales||[]).filter(e=>e.mes===mes).reduce((s,e)=>s+e.monto,0);
  const impMes = S.impuestos.pagos.filter(p=>p.estado==='pagado'&&(p.fpago||'').startsWith(mes)).reduce((s,p)=>s+p.monto,0);
  const echMes = S.echeqs.items.filter(e=>e.cobrado&&e.fecha.startsWith(mes)&&e.origen!=='proveedor').reduce((s,e)=>s+e.monto,0);
  const totalEgr = provMes + sueldosMes + insumosMes + impMes + echMes;
  const res = totalIng - totalEgr;
  const resColor = res >= 0 ? '#1e8e3e' : '#d93025';
  // Bloque resumen
  const db = document.getElementById('dash-bloque');
  if(db) db.innerHTML = `
    <div class="dash-col">
      <div class="dash-col-title" style="color:#1e8e3e">↑ Ingresos — ${nomMes(mes)}</div>
      <div class="dash-fila sub"><span>Caja (cierre diario)</span><span>${fmt(cajMes)}</span></div>
      <div class="dash-fila sub"><span>Transferencias / cheques / echeqs</span><span>${fmt(ingMes)}</span></div>
      <div class="dash-fila"><span>Total ingresos</span><span style="color:#1e8e3e">${fmt(totalIng)}</span></div>
    </div>
    <div class="dash-col">
      <div class="dash-col-title" style="color:#d93025">↓ Egresos — ${nomMes(mes)}</div>
      <div class="dash-fila sub"><span>Proveedores pagados</span><span>${fmt(provMes)}</span></div>
      <div class="dash-fila sub"><span>Sueldos</span><span>${fmt(sueldosMes)}</span></div>
      ${insumosMes?`<div class="dash-fila sub"><span>Insumos generales</span><span>${fmt(insumosMes)}</span></div>`:''}
      <div class="dash-fila sub"><span>Impuestos</span><span>${fmt(impMes)}</span></div>
      <div class="dash-fila sub"><span>Echeqs cobrados (manuales)</span><span>${fmt(echMes)}</span></div>
      <div class="dash-fila"><span>Total egresos</span><span style="color:#d93025">${fmt(totalEgr)}</span></div>
    </div>`;
  // Cards
  const echV30 = S.echeqs.items.filter(e=>{if(e.cobrado)return false;const d=new Date();d.setDate(d.getDate()+30);return e.fecha>=h&&e.fecha<=d.toISOString().split('T')[0];});
  const ivaVM = S.iva.ventas.filter(v=>v.fecha.startsWith(mes)).reduce((s,v)=>s+v.iva,0);
  const ivaCM = S.iva.compras.filter(c=>c.fecha.startsWith(mes)).reduce((s,c)=>s+c.iva,0);
  const suPend = S.sueldos.pagos.filter(p=>p.mes===mes&&!p.pagado).length;
  const dg = document.getElementById('dash-grid');
  if(dg) dg.innerHTML = `
    <div class="dash-card" style="border-top:3px solid ${resColor}">
      <div class="dash-card-title">Resultado del mes</div>
      <div class="dash-row"><span>Ingresos</span><span style="color:#1e8e3e">${fmt(totalIng)}</span></div>
      <div class="dash-row"><span>Egresos</span><span style="color:#d93025">${fmt(totalEgr)}</span></div>
      <div class="dash-row"><span>${res>=0?'Superávit':'Déficit'}</span><span style="color:${resColor}">${fmt(Math.abs(res))}</span></div>
    </div>
    <div class="dash-card">
      <div class="dash-card-title">Echeqs próximos 30 días</div>
      ${echV30.length ? echV30.slice(0,4).map(e=>`<div class="dash-row"><span>${e.beneficiario}</span><span style="color:#d93025">-${fmt(e.monto)}</span></div>`).join('')+`<div class="dash-row"><span>Total</span><span style="color:#d93025">-${fmt(echV30.reduce((s,e)=>s+e.monto,0))}</span></div>` : '<div style="font-size:13px;color:#aaa;padding:8px 0">Sin echeqs próximos.</div>'}
    </div>
    <div class="dash-card">
      <div class="dash-card-title">IVA del mes</div>
      <div class="dash-row"><span>Débito (ventas)</span><span style="color:#d93025">${fmt(ivaVM)}</span></div>
      <div class="dash-row"><span>Crédito (compras)</span><span style="color:#1a73e8">${fmt(ivaCM)}</span></div>
      <div class="dash-row"><span>${ivaVM-ivaCM>=0?'A pagar':'A favor'}</span><span style="color:${ivaVM-ivaCM>=0?'#d93025':'#1e8e3e'}">${fmt(Math.abs(ivaVM-ivaCM))}</span></div>
    </div>
    <div class="dash-card">
      <div class="dash-card-title">Sueldos & banco</div>
      <div class="dash-row"><span>Sueldos del mes</span><span style="color:#d93025">${fmt(sueldosMes)}</span></div>
      ${insumosMes?`<div class="dash-row"><span>Insumos generales</span><span style="color:var(--gold-dark)">${fmt(insumosMes)}</span></div>`:''}
      ${suPend?`<div class="dash-row" style="color:#e37400"><span>Sin pagar</span><span>${suPend}</span></div>`:''}
      <div class="dash-row"><span>Impuestos pagados</span><span style="color:#d93025">${fmt(impMes)}</span></div>
      <div class="dash-row"><span>Saldo banco</span><span>${fmt(S.echeqs.saldo)}</span></div>
    </div>`;
};

window.echFiltBtn = function(btn) {
  document.querySelectorAll('#mod-content .filter-row .fb').forEach(b=>b.classList.remove('active'));

window.ech_calcImp = function() {
  const m = vn('e-monto'), imp = Math.round(m*ECH_IMP*100)/100;
  const el1=document.getElementById('e-impuesto'), el2=document.getElementById('e-total-calc');
  if(el1) el1.value = imp||'';
  if(el2) el2.value = m ? Math.round((m+imp)*100)/100 : '';
};
window.ech_guardarSaldo = async function() {
  const v = parseFloat(document.getElementById('e-input-saldo').value);
  if(isNaN(v)){alert('Monto inválido');return;}
  S.echeqs.saldo=v; S.echeqs.saldoFecha=new Date().toLocaleString('es-AR');
  await save('echeqs'); echRenderCards();
  document.getElementById('e-input-saldo').value='';
  const si=document.getElementById('e-saldo-info');if(si)si.textContent='Actualizado '+S.echeqs.saldoFecha;
};
window.ech_agregar = async function() {
  const b=document.getElementById('e-benef').value.trim(), m=parseFloat(document.getElementById('e-monto').value), f=document.getElementById('e-fecha').value;
  if(!b||isNaN(m)||!f){alert('Completá beneficiario, monto y fecha');return;}
  const imp=Math.round(m*ECH_IMP*100)/100;
  S.echeqs.items.push({id:Date.now(),beneficiario:b,monto:Math.round((m+imp)*100)/100,montoNominal:m,impuesto:imp,fecha:f,numero:document.getElementById('e-num').value.trim(),concepto:document.getElementById('e-conc').value.trim(),cobrado:false,origen:'manual'});
  S.echeqs.items.sort((a,b)=>a.fecha.localeCompare(b.fecha));
  await save('echeqs'); ech_dlUpdate();
  ['e-benef','e-monto','e-impuesto','e-total-calc','e-num','e-conc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('e-fecha').value=hoy();
  echRenderCards(); echRender();
};
window.ech_toggle = async function(id) {
  const e=S.echeqs.items.find(x=>x.id===id); if(!e)return;
  e.cobrado=!e.cobrado; await save('echeqs'); echRenderCards(); echRender();
};
window.ech_del = async function(id) {
  if(!isAdmin()){alert('Solo el admin puede eliminar.');return;}
  if(!confirm('¿Eliminás este echeq?'))return;
  S.echeqs.items=S.echeqs.items.filter(x=>x.id!==id);
  await save('echeqs'); ech_dlUpdate(); echRenderCards(); echRender();
};
window.ech_abrirEdit = function(id) {
  const e=S.echeqs.items.find(x=>x.id===id); if(!e)return;
  document.getElementById('ech-edit-id').value=id;
  document.getElementById('ech-edit-benef').value=e.beneficiario||'';
  document.getElementById('ech-edit-monto').value=e.montoNominal||e.monto||'';
  document.getElementById('ech-edit-imp').value=e.impuesto||'';
  document.getElementById('ech-edit-total').value=e.monto||'';
  document.getElementById('ech-edit-fecha').value=e.fecha||'';
  document.getElementById('ech-edit-num').value=e.numero||'';
  document.getElementById('ech-edit-conc').value=e.concepto||'';
  ech_dlUpdate();
  document.getElementById('ech-modal').classList.add('open');
};
window.ech_editCalc = function() {
  const m=parseFloat(document.getElementById('ech-edit-monto').value)||0;

window.ech_guardarEdit = async function() {
  const id=parseInt(document.getElementById('ech-edit-id').value);
  const e=S.echeqs.items.find(x=>x.id===id); if(!e){alert('Error');return;}

function echRenderCards() {
  const h=hoy(), mes=mesPref();
  const pend=S.echeqs.items.filter(e=>!e.cobrado);
  const tot=pend.reduce((s,e)=>s+e.monto,0);
  const proy=S.echeqs.saldo-tot;
  const vhoy=pend.filter(e=>e.fecha===h).reduce((s,e)=>s+e.monto,0);
  const vmes=pend.filter(e=>e.fecha.startsWith(mes)).reduce((s,e)=>s+e.monto,0);
  const se=document.getElementById('e-saldo');if(se)se.textContent=fmt(S.echeqs.saldo);
  const pe=document.getElementById('e-pend');if(pe)pe.textContent=pend.length;
  const te=document.getElementById('e-total');if(te)te.textContent=fmt(tot);
  const prE=document.getElementById('e-proy');
  if(prE){prE.textContent=fmt(proy);prE.className='card-value '+(proy<0?'cv-red':proy<50000?'cv-yellow':'cv-green');}
  const vh=document.getElementById('e-vhoy');if(vh)vh.textContent=fmt(vhoy);
  const vm=document.getElementById('e-vmes');if(vm)vm.textContent=fmt(vmes);
  if(S.echeqs.saldoFecha){const si=document.getElementById('e-saldo-info');if(si)si.textContent='Último ingreso: '+S.echeqs.saldoFecha;}
  // Alertas
  const ab=document.getElementById('ech-alerta');
  if(ab){
    const aH=pend.filter(e=>e.fecha===h), aM=pend.filter(e=>e.fecha===manana());
    let msg='';
    if(aH.length)msg+='⚠ Cobran hoy: '+aH.map(e=>e.beneficiario).join(', ')+'. ';
    if(aM.length)msg+='🔔 Cobran mañana: '+aM.map(e=>e.beneficiario).join(', ')+'.';
    if(msg){ab.textContent=msg;ab.classList.add('show');}else ab.classList.remove('show');
  }
}
function echRender() {
  const h=hoy(), m=manana();
  let lista=S.echeqs.items.slice();
  if(echFiltro==='pendiente')lista=lista.filter(e=>!e.cobrado);
  else if(echFiltro==='hoy')lista=lista.filter(e=>e.fecha===h&&!e.cobrado);
  else if(echFiltro==='cobrado')lista=lista.filter(e=>e.cobrado);
  const bd=document.getElementById('e-badge');if(bd)bd.textContent=lista.length;
  const cont=document.getElementById('ech-list');if(!cont)return;
  if(!lista.length){cont.innerHTML='<div class="empty">No hay echeqs.</div>';return;}
  const pendOrd=S.echeqs.items.filter(e=>!e.cobrado).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  cont.innerHTML=lista.map(e=>{
    let cls='item',bdg='';
    if(!e.cobrado){
      if(e.fecha===h){cls='item al-hoy';bdg='<span class="badge b-red">Cobran hoy</span>';}
      else if(e.fecha===m){cls='item al-man';bdg='<span class="badge b-yellow">Mañana</span>';}
      else if(e.fecha>h)bdg='<span class="badge b-blue">Pendiente</span>';
      else bdg='<span class="badge b-red">Vencido</span>';
    }else{cls='item done';bdg='<span class="badge b-green">Cobrado</span>';}
    let proy2='';
    if(!e.cobrado){const idx=pendOrd.findIndex(x=>x.id===e.id);let ac=S.echeqs.saldo;for(let i=0;i<=idx;i++)ac-=pendOrd[i].monto;proy2=`<div style="font-size:12px;color:#888">Saldo tras cobro: <strong style="color:${ac<0?'#d93025':'#1e8e3e'}">${fmt(ac)}</strong></div>`;}
    const ob=e.origen==='proveedor'?'<span class="badge b-teal" style="font-size:10px">Proveedores</span>':'';
    const impBdg=e.impuesto?`<span class="ech-imp">Imp: ${fmt(e.impuesto)}</span>`:'';
    const nomInfo=e.montoNominal?`<span style="font-size:12px;color:#888">Nominal: ${fmt(e.montoNominal)}</span>`:'';
    return `<div class="${cls}">
      <div class="item-h"><span class="item-name">${e.beneficiario} ${ob}</span><span class="item-amt">${fmt(e.monto)}</span></div>
      <div class="item-meta"><span>Cobro: ${fmtF(e.fecha)}</span>${e.numero?`<span>N°${e.numero}</span>`:''}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">${nomInfo} ${impBdg}</div>
      ${proy2}
      <div class="item-foot">${bdg}
        <div style="display:flex;gap:6px">
          <button class="btn-s" onclick="ech_toggle(${e.id})">${e.cobrado?'↩ Reactivar':'✓ Cobrado'}</button>
          <button class="btn-s" onclick="ech_abrirEdit(${e.id})">✏ Editar</button>
          ${isAdmin()?`<button class="btn-s btn-del" onclick="ech_del(${e.id})">Eliminar</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

  if(vn('c-openpay'))p.push('OP: '+fmt(vn('c-openpay')));
  if(vn('c-provincia'))p.push('Prov: '+fmt(vn('c-provincia')));
  if(vn('c-otro'))p.push('Otro: '+fmt(vn('c-otro')));

window.c_guardar = async function(){
  const f=document.getElementById('c-fecha').value;
  const ef=vn('c-ef-i'),tj=vn('c-tarjetas'),ual=vn('c-uala'),op=vn('c-openpay'),pv=vn('c-provincia'),ot=vn('c-otro');
  if(!f){alert('Ingresá la fecha');return;}
  if(!ef&&!tj&&!ual&&!op&&!pv&&!ot){alert('Ingresá al menos un monto');return;}
  const ex=S.caja.cierres.find(c=>c.fecha===f);
  if(ex&&!confirm('Ya existe cierre para '+fmtF(f)+'. ¿Reemplazar?'))return;
  if(ex)S.caja.cierres=S.caja.cierres.filter(c=>c.fecha!==f);
  S.caja.cierres.push({id:Date.now(),fecha:f,efectivo:ef,tarjetas:tj,debito:tj,credito:0,uala:ual,openpay:op,provincia:pv,otro:ot,otroDesc:document.getElementById('c-otro-d').value.trim(),obs:document.getElementById('c-obs').value.trim(),total:ef+tj+ual+op+pv+ot});
  S.caja.cierres.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  await save('caja');
  ['c-ef-i','c-tarjetas','c-uala','c-openpay','c-provincia','c-otro','c-otro-d','c-obs'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  c_prev(); c_renderCards(); c_renderHist();
};
window.c_del = async function(id){
  if(!isAdmin()){alert('Solo el admin puede eliminar.');return;}
  if(!confirm('¿Eliminás?'))return;
  S.caja.cierres=S.caja.cierres.filter(c=>c.id!==id);
  await save('caja'); c_renderCards(); c_renderHist();
};
function c_renderCards(){
  const h=hoy(),mes=mesPref();
  const ch=S.caja.cierres.find(c=>c.fecha===h);
  const cm=S.caja.cierres.filter(c=>c.fecha.startsWith(mes));
  const tj=ch?(ch.tarjetas!==undefined?ch.tarjetas:(ch.debito||0)+(ch.credito||0)):0;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=fmt(v);};
  set('c-hoy',ch?ch.total:0); set('c-ef',ch?ch.efectivo:0); set('c-tj',tj);
  set('c-op',ch?(ch.openpay||0):0); set('c-pv',ch?(ch.provincia||0):0);
  set('c-mes',cm.reduce((s,c)=>s+c.total,0));
}
function c_renderHist(){
  const h=hoy(),mes=mesPref();
  const sem=new Date();sem.setDate(sem.getDate()-sem.getDay()+1);const semS=sem.toISOString().split('T')[0];
  let lh=S.caja.cierres.slice();
  if(cajFH==='mes')lh=lh.filter(c=>c.fecha.startsWith(mes));
  else if(cajFH==='semana')lh=lh.filter(c=>c.fecha>=semS);
  else if(cajFH==='custom'&&cajFM)lh=lh.filter(c=>c.fecha.startsWith(cajFM));
  const cl=document.getElementById('c-list');if(!cl)return;
  if(!lh.length){cl.innerHTML='<div class="empty">Sin cierres.</div>';return;}
  let html='',mp='';
  lh.forEach(c=>{
    const mc=c.fecha.slice(0,7);if(mc!==mp){html+=`<div class="mes-h">${nomMes(mc)}</div>`;mp=mc;}
    const tj=c.tarjetas!==undefined?c.tarjetas:(c.debito||0)+(c.credito||0);
    const p=[];
    if(c.efectivo)p.push('Ef: '+fmt(c.efectivo));if(tj)p.push('Tarj: '+fmt(tj));
    if(c.uala)p.push('Uala: '+fmt(c.uala));if(c.openpay)p.push('OP: '+fmt(c.openpay));
    if(c.provincia)p.push('Prov: '+fmt(c.provincia));if(c.otro)p.push((c.otroDesc||'Otro')+': '+fmt(c.otro));
    html+=`<div class="item"><div class="item-h"><span class="item-name">${fmtF(c.fecha)}${c.fecha===h?' <span class="badge b-blue">Hoy</span>':''}</span>${isAdmin()?`<button class="btn-s btn-del" onclick="c_del(${c.id})">Eliminar</button>`:''}</div><div class="item-meta">${p.join(' · ')}</div>${c.obs?`<div style="font-size:12px;color:#888">${c.obs}</div>`:''}<div style="display:flex;justify-content:space-between;border-top:1px solid #f0f0f0;padding-top:8px;margin-top:4px"><span style="font-size:12px;color:#888">Total</span><span style="font-weight:700;color:#1e8e3e">${fmt(c.total)}</span></div></div>`;
  });
  cl.innerHTML=html;
}
window.c_resumen = function(){

};

function p_renderCards(){
  const h=hoy(),fs=finSem(),mes=mesPref();
  const pend=S.proveedores.pagos.filter(p=>p.estado!=='pagado');
  const venc=pend.filter(p=>p.fechaVenc&&p.fechaVenc<h);
  const sem=pend.filter(p=>p.fechaVenc&&p.fechaVenc>=h&&p.fechaVenc<=fs);
  const pagMes=S.proveedores.pagos.filter(p=>p.estado==='pagado'&&p.fechaPago.startsWith(mes));
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=fmt(v);};
  const setn=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('p-pend-t',pend.reduce((s,p)=>s+p.monto,0));setn('p-venc-n',venc.length);
  set('p-sem-t',sem.reduce((s,p)=>s+p.monto,0));set('p-pmes-t',pagMes.reduce((s,p)=>s+p.monto,0));
  const ab=document.getElementById('pv-alerta');
  if(ab){let msg='';if(venc.length)msg+='⚠ Vencidos: '+venc.map(p=>p.proveedor).join(', ')+'. ';const hv=pend.filter(p=>p.fechaVenc===h);if(hv.length)msg+='🔔 Vencen hoy: '+hv.map(p=>p.proveedor).join(', ')+'.';if(msg){ab.textContent=msg;ab.classList.add('show');}else ab.classList.remove('show');}
  const bd=document.getElementById('p-badge');if(bd)bd.textContent=pend.length;
}
function p_itemHtml(p){
  const h=hoy(),fs=finSem();let cls='item',bdg='';
  if(p.estado==='pagado'){cls='item done';bdg='<span class="badge b-green">Pagado</span>';}
  else if(p.fechaVenc&&p.fechaVenc<h){cls='item al-hoy';bdg='<span class="badge b-red">Vencido</span>';}
  else if(p.fechaVenc&&p.fechaVenc===h){cls='item al-hoy';bdg='<span class="badge b-yellow">Vence hoy</span>';}
  else if(p.fechaVenc&&p.fechaVenc<=fs)bdg='<span class="badge b-yellow">Esta semana</span>';
  else bdg='<span class="badge b-blue">Pendiente</span>';
  return `<div class="${cls}"><div class="item-h"><span class="item-name">${p.proveedor}</span><span class="item-amt">${fmt(p.monto)}</span></div>
    <div class="item-meta"><span>${fmtF(p.fechaPago)}</span>${p.fechaVenc?`<span>Vence: ${fmtF(p.fechaVenc)}</span>`:''}<span>${cap(p.forma)}</span><span>${cap(p.categoria)}</span>${p.factura?`<span>F:${p.factura}</span>`:''}</div>
    ${p.obs?`<div style="font-size:12px;color:#888">${p.obs}</div>`:''}
    <div class="item-foot">${bdg}${p.forma==='echeq'?'<span class="badge b-teal">Echeq</span>':''}
      <div style="display:flex;gap:6px">
        <button class="btn-s" onclick="p_toggle(${p.id})">${p.estado==='pagado'?'↩ Reactivar':'✓ Pagado'}</button>
        ${isAdmin()?`<button class="btn-s btn-del" onclick="p_del(${p.id})">Eliminar</button>`:''}
      </div>
    </div></div>`;
}
function p_renderPend(){
  const h=hoy(),fs=finSem(),mes=mesPref();
  let lp=S.proveedores.pagos.filter(p=>p.estado!=='pagado');
  if(pvFilt==='vencidos')lp=lp.filter(p=>p.fechaVenc&&p.fechaVenc<h);
  else if(pvFilt==='semana')lp=lp.filter(p=>p.fechaVenc&&p.fechaVenc>=h&&p.fechaVenc<=fs);
  else if(pvFilt==='mes')lp=lp.filter(p=>p.fechaVenc&&p.fechaVenc.startsWith(mes));
  const el=document.getElementById('p-list-pend');if(el)el.innerHTML=lp.length?lp.map(p_itemHtml).join(''):'<div class="empty">Sin pendientes.</div>';
}
function p_renderHist(){
  const mes=mesPref();
  let lh=S.proveedores.pagos.slice();
  if(pvFH==='mes')lh=lh.filter(p=>p.fechaPago.startsWith(mes));
  else if(pvFH==='custom'&&pvFHM)lh=lh.filter(p=>p.fechaPago.startsWith(pvFHM));
  const fp=document.getElementById('p-filtro-prov');
  if(fp&&fp.value.trim())lh=lh.filter(p=>p.proveedor.toLowerCase().includes(fp.value.trim().toLowerCase()));
  const hd=document.getElementById('p-hist-dl');
  if(hd){const ps=[...new Set(S.proveedores.pagos.map(p=>p.proveedor))].sort();hd.innerHTML=ps.map(p=>`<option value="${p}">`).join('');}
  lh.sort((a,b)=>b.fechaPago.localeCompare(a.fechaPago));
  const cl=document.getElementById('p-list-hist');if(!cl)return;
  if(!lh.length){cl.innerHTML='<div class="empty">Sin pagos.</div>';return;}
  let html='',mp='';
  lh.forEach(p=>{const mc=p.fechaPago.slice(0,7);if(mc!==mp){html+=`<div class="mes-h">${nomMes(mc)}</div>`;mp=mc;}html+=p_itemHtml(p);});
  cl.innerHTML=html;
}
window.p_renderRes=function(){
  const pm={};S.proveedores.pagos.forEach(p=>{if(!pm[p.proveedor])pm[p.proveedor]={n:p.proveedor,tp:0,tpend:0,cp:0,cpend:0};if(p.estado==='pagado'){pm[p.proveedor].tp+=p.monto;pm[p.proveedor].cp++;}else{pm[p.proveedor].tpend+=p.monto;pm[p.proveedor].cpend++;}});
  const list=Object.values(pm).sort((a,b)=>(b.tp+b.tpend)-(a.tp+a.tpend));
  const el=document.getElementById('p-list-res');if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty">Sin datos.</div>';return;}
  el.innerHTML=list.map(p=>`<div class="item"><div class="item-h"><span class="item-name">${p.n}</span><span class="item-amt">${fmt(p.tp+p.tpend)}</span></div><div class="item-meta"><span>Pagado: <strong style="color:#1e8e3e">${fmt(p.tp)}</strong> (${p.cp})</span>${p.tpend?`<span>Pendiente: <strong style="color:#d93025">${fmt(p.tpend)}</strong></span>`:''}</div></div>`).join('');
};

window.iva_calcV=function(){const m=vn('iv-v-monto'),a=parseFloat(document.getElementById('iv-v-alic').value)||0;const el=document.getElementById('iv-v-iva');if(el)el.value=m>0&&a>0?Math.round((m/(1+a))*a*100)/100:'';};
window.iva_calcC=function(){const m=vn('iv-c-monto'),a=parseFloat(document.getElementById('iv-c-alic').value)||0;const el=document.getElementById('iv-c-iva');if(el&&a>0)el.value=Math.round((m/(1+a))*a*100)/100||'';};
window.iva_guardarV=async function(){
  const fecha=document.getElementById('iv-v-fecha').value;
  const monto=vn('iv-v-monto'), iva=vn('iv-v-iva');
  if(!fecha){alert('Completá la fecha');return;}
  if(monto===0&&iva===0){alert('Ingresá al menos el monto o el IVA / retención');return;}
  S.iva.ventas.push({id:Date.now(),fecha,tipo:ivaTipoV,monto,iva,numero:document.getElementById('iv-v-num').value.trim()});
  S.iva.ventas.sort((a,b)=>b.fecha.localeCompare(a.fecha));await save('iva');
  ['iv-v-monto','iv-v-iva','iv-v-num'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  iva_renderV(); iva_renderRes();
};
window.iva_guardarC=async function(){
  const fecha=document.getElementById('iv-c-fecha').value,monto=vn('iv-c-monto'),iva=vn('iv-c-iva'),prov=document.getElementById('iv-c-prov').value.trim();
  if(!fecha||!monto||!prov){alert('Completá fecha, proveedor y monto');return;}
  S.iva.compras.push({id:Date.now(),fecha,proveedor:prov,numero:document.getElementById('iv-c-num').value.trim(),monto,iva});
  S.iva.compras.sort((a,b)=>b.fecha.localeCompare(a.fecha));await save('iva');iva_dlUpdate();
  ['iv-c-monto','iv-c-iva','iv-c-num','iv-c-prov'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  iva_renderC(); iva_renderRes();
};
window.iva_delV=async function(id){if(!isAdmin()){alert('Solo el admin puede eliminar.');return;}if(!confirm('¿Eliminás?'))return;S.iva.ventas=S.iva.ventas.filter(v=>v.id!==id);await save('iva');iva_renderV();iva_renderRes();};
window.iva_delC=async function(id){if(!isAdmin()){alert('Solo el admin puede eliminar.');return;}if(!confirm('¿Eliminás?'))return;S.iva.compras=S.iva.compras.filter(c=>c.id!==id);await save('iva');iva_renderC();iva_renderRes();};

window.iva_renderHist=function(){
  const anio=document.getElementById('iva-anio')?.value;if(!anio)return;
  const meses=['01','02','03','04','05','06','07','08','09','10','11','12'];
  const filas=meses.map(m=>{
    const mes=anio+'-'+m;
    const vt=S.iva.ventas.filter(v=>v.fecha.startsWith(mes));
    const cp=S.iva.compras.filter(c=>c.fecha.startsWith(mes));
    if(!vt.length&&!cp.length)return'';
    const ivV=vt.reduce((s,v)=>s+v.iva,0),ivC=cp.reduce((s,c)=>s+c.iva,0),dif=ivV-ivC;
    const nm=cap(new Date(+anio,+m-1).toLocaleDateString('es-AR',{month:'long'}));
    return`<tr><td>${nm}</td><td style="text-align:right;color:#d93025">${fmt(ivV)}</td><td style="text-align:right;color:#1a73e8">${fmt(ivC)}</td><td style="text-align:right;font-weight:700;color:${dif>=0?'#d93025':'#1e8e3e'}">${fmt(Math.abs(dif))}</td><td style="text-align:center;font-size:12px;font-weight:700;color:${dif>=0?'#d93025':'#1e8e3e'}">${dif>=0?'PAGAR':'A FAVOR'}</td></tr>`;
  }).filter(Boolean).join('');
  const el=document.getElementById('iva-hist-content');if(!el)return;
  if(!filas){el.innerHTML='<div class="empty">Sin datos.</div>';return;}
  el.innerHTML=`<table class="iva-tabla"><thead><tr><th>Mes</th><th style="text-align:right">Débito</th><th style="text-align:right">Crédito</th><th style="text-align:right">Diferencia</th><th style="text-align:center">Estado</th></tr></thead><tbody>${filas}</tbody></table>`;
};

function su_renderCards(){
  const mes=mesPref();
  const pagos=S.sueldos.pagos.filter(p=>p.mes===mes);
  const totalMes=pagos.reduce((s,p)=>s+p.neto,0);
  const pagados=pagos.filter(p=>p.pagado).length;
  const activos=S.sueldos.empleados.filter(e=>e.activo).length;
  const extras=S.sueldos.extras_generales||[];
  const totalInsumos=extras.filter(e=>e.mes===mes).reduce((s,e)=>s+e.monto,0);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('su-mes-total',fmt(totalMes));set('su-cant-emp',activos);

        <div class="sf"><label>Sueldo bruto ($)</label><input type="number" id="su-b-${e.id}" value="${pago.bruto||''}" step="0.01" placeholder="${e.base||0}" oninput="su_calcNeto(${e.id})"/></div>
        <div class="sf"><label>Extras ($)</label><input type="number" id="su-ex-${e.id}" value="${pago.extras||''}" step="0.01" oninput="su_calcNeto(${e.id})"/></div>
        <div class="sf"><label>Descuentos ($)</label><input type="number" id="su-d-${e.id}" value="${pago.descuentos||''}" step="0.01" oninput="su_calcNeto(${e.id})"/></div>
        <div class="sf"><label>Observaciones</label><input type="text" id="su-obs-${e.id}" value="${pago.obs||''}"/></div>
      </div>
      <div class="sueldo-foot"><span>Neto: <strong id="su-n-${e.id}" style="color:#1e8e3e;font-size:15px">${fmt(neto)}</strong></span><label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" id="su-pag-${e.id}" ${pago.pagado?'checked':''} style="width:auto"> Marcar pagado</label></div>
    </div>`;
  });
  html+=`<div style="background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px;margin-top:8px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:700">Total del mes</span><span style="font-size:20px;font-weight:700;color:#d93025" id="su-total-prev">$0</span></div>`;
  el.innerHTML=html; su_recalcTotal();
}
window.su_calcNeto=function(id){
  const b=parseFloat(document.getElementById('su-b-'+id)?.value)||0;
  const ex=parseFloat(document.getElementById('su-ex-'+id)?.value)||0;
  const d=parseFloat(document.getElementById('su-d-'+id)?.value)||0;
  const ne=document.getElementById('su-n-'+id);if(ne)ne.textContent=fmt(b+ex-d);
  su_recalcTotal();
};
function su_recalcTotal(){
  const activos=S.sueldos.empleados.filter(e=>e.activo);
  let tot=0;
  activos.forEach(e=>{const b=parseFloat(document.getElementById('su-b-'+e.id)?.value)||0;const ex=parseFloat(document.getElementById('su-ex-'+e.id)?.value)||0;const d=parseFloat(document.getElementById('su-d-'+e.id)?.value)||0;tot+=b+ex-d;});
  const tp=document.getElementById('su-total-prev');if(tp)tp.textContent=fmt(tot);
}
window.su_guardarTodos=async function(){
  const mes=document.getElementById('su-mes-sel')?.value||mesPref();
  const activos=S.sueldos.empleados.filter(e=>e.activo);
  S.sueldos.pagos=S.sueldos.pagos.filter(p=>p.mes!==mes);
  let tot=0;
  activos.forEach(e=>{
    const b=parseFloat(document.getElementById('su-b-'+e.id)?.value)||0;
    const ex=parseFloat(document.getElementById('su-ex-'+e.id)?.value)||0;
    const d=parseFloat(document.getElementById('su-d-'+e.id)?.value)||0;
    const pg=document.getElementById('su-pag-'+e.id)?.checked||false;
    const neto=b+ex-d; tot+=neto;
    S.sueldos.pagos.push({id:Date.now()+Math.random(),mes,empId:e.id,empNombre:e.nombre,bruto:b,extras:ex,descuentos:d,neto,pagado:pg,obs:document.getElementById('su-obs-'+e.id)?.value.trim()||''});
  });
  await save('sueldos'); su_renderCards();
  alert('✅ Sueldos de '+nomMes(mes)+' guardados. Total: '+fmt(tot));
};
window.su_agregarEmp=async function(){
  const n=document.getElementById('su-emp-nombre').value.trim();if(!n){alert('Ingresá el nombre');return;}
  if(S.sueldos.empleados.length>=8){alert('Máximo 8 empleados');return;}
  S.sueldos.empleados.push({id:Date.now(),nombre:n,puesto:document.getElementById('su-emp-puesto').value.trim(),base:parseFloat(document.getElementById('su-emp-base').value)||0,activo:true});
  await save('sueldos');['su-emp-nombre','su-emp-puesto','su-emp-base'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  su_renderEmps(); su_renderPagar(); su_renderCards();
};
window.su_toggleEmp=async function(id){const e=S.sueldos.empleados.find(x=>x.id===id);if(!e)return;e.activo=!e.activo;await save('sueldos');su_renderEmps();su_renderPagar();su_renderCards();};
window.su_delEmp=async function(id){if(!isAdmin()){alert('Solo admin.');return;}if(!confirm('¿Eliminás?'))return;S.sueldos.empleados=S.sueldos.empleados.filter(x=>x.id!==id);await save('sueldos');su_renderEmps();su_renderPagar();su_renderCards();};
window.su_renderHist=function(){
  const mes=document.getElementById('su-hist-mes')?.value;if(!mes)return;
  const pagos=S.sueldos.pagos.filter(p=>p.mes===mes);
  const insumos=(S.sueldos.extras_generales||[]).filter(e=>e.mes===mes);
  const el=document.getElementById('su-hist-content');if(!el)return;
  if(!pagos.length&&!insumos.length){el.innerHTML='<div class="empty">Sin datos para '+nomMes(mes)+'.</div>';return;}
  const tot=pagos.reduce((s,p)=>s+p.neto,0);
  const totIns=insumos.reduce((s,e)=>s+e.monto,0);
  el.innerHTML=`<div style="font-size:13px;font-weight:700;color:#888;margin-bottom:12px">${nomMes(mes)}</div>
    <table><thead><tr><th>Empleado</th><th style="text-align:right">Bruto</th><th style="text-align:right">Extras</th><th style="text-align:right">Desc.</th><th style="text-align:right">Neto</th><th style="text-align:center">Estado</th></tr></thead>
    <tbody>${pagos.map(p=>`<tr><td style="font-weight:700">${p.empNombre}</td><td style="text-align:right">${fmt(p.bruto)}</td><td style="text-align:right;color:#1e8e3e">${fmt(p.extras)}</td><td style="text-align:right;color:#d93025">${fmt(p.descuentos)}</td><td style="text-align:right;font-weight:700">${fmt(p.neto)}</td><td style="text-align:center"><span class="badge ${p.pagado?'b-green':'b-yellow'}">${p.pagado?'Pagado':'Pendiente'}</span></td></tr>`).join('')}</tbody>
    <tfoot><tr><td>Sueldos</td><td colspan="3"></td><td style="text-align:right">${fmt(tot)}</td><td></td></tr></tfoot></table>
    ${insumos.length?`<div style="margin-top:16px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:8px">Insumos generales</div>
    <table><thead><tr><th>Categoría</th><th>Descripción</th><th style="text-align:right">Monto</th></tr></thead>
    <tbody>${insumos.map(e=>`<tr><td style="font-weight:700">${e.categoria}</td><td style="color:#888">${e.desc||'—'}</td><td style="text-align:right;color:var(--gold-dark);font-weight:700">${fmt(e.monto)}</td></tr>`).join('')}</tbody>
    <tfoot><tr><td colspan="2">Total insumos</td><td style="text-align:right">${fmt(totIns)}</td></tr></tfoot></table>
    <div style="margin-top:12px;padding:10px 14px;background:var(--gray-light);border-radius:3px;border-left:4px solid var(--black);display:flex;justify-content:space-between">
      <span style="font-weight:700;font-size:13px">TOTAL GENERAL</span>
      <span style="font-weight:700;font-size:15px">${fmt(tot+totIns)}</span>
    </div></div>`:''}`;
};

window.impFBtn=function(btn){document.querySelectorAll('#imp-historial .fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};
window.imp_guardar=async function(){
  const concepto=document.getElementById('imp-concepto').value.trim(),monto=parseFloat(document.getElementById('imp-monto').value);
  if(!concepto||isNaN(monto)){alert('Completá concepto y monto');return;}
  S.impuestos.pagos.push({id:Date.now(),concepto,monto,periodo:document.getElementById('imp-periodo').value,fvenc:document.getElementById('imp-fvenc').value,fpago:document.getElementById('imp-fpago').value,estado:document.getElementById('imp-estado').value,num:document.getElementById('imp-num').value.trim(),obs:document.getElementById('imp-obs').value.trim()});
  S.impuestos.pagos.sort((a,b)=>(a.fvenc||a.periodo||'').localeCompare(b.fvenc||b.periodo||''));
  await save('impuestos'); imp_dlUpdate();
  ['imp-concepto','imp-monto','imp-fvenc','imp-fpago','imp-num','imp-obs'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('imp-estado').value='pendiente';
  imp_renderCards(); imp_renderPend(); imp_renderHist();
};
window.imp_toggle=async function(id){const p=S.impuestos.pagos.find(x=>x.id===id);if(!p)return;p.estado=p.estado==='pagado'?'pendiente':'pagado';if(p.estado==='pagado'&&!p.fpago)p.fpago=hoy();await save('impuestos');imp_renderCards();imp_renderPend();imp_renderHist();};
window.imp_del=async function(id){if(!isAdmin()){alert('Solo admin.');return;}if(!confirm('¿Eliminás?'))return;S.impuestos.pagos=S.impuestos.pagos.filter(p=>p.id!==id);await save('impuestos');imp_dlUpdate();imp_renderCards();imp_renderPend();imp_renderHist();};
function imp_renderCards(){
  const h=hoy(),mes=mesPref(),fs=finSem(),anio=new Date().getFullYear()+'';
  const pend=S.impuestos.pagos.filter(p=>p.estado!=='pagado');
  const pagMes=S.impuestos.pagos.filter(p=>p.estado==='pagado'&&(p.fpago||'').startsWith(mes));
  const pagAnio=S.impuestos.pagos.filter(p=>p.estado==='pagado'&&(p.fpago||'').startsWith(anio));
  const semPend=pend.filter(p=>p.fvenc&&p.fvenc>=h&&p.fvenc<=fs);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('imp-mes',fmt(pagMes.reduce((s,p)=>s+p.monto,0)));set('imp-pend-t',fmt(pend.reduce((s,p)=>s+p.monto,0)));
  set('imp-anio-t',fmt(pagAnio.reduce((s,p)=>s+p.monto,0)));set('imp-sem-n',semPend.length);
  set('imp-badge',pend.length);
  const ab=document.getElementById('imp-alerta');
  if(ab){const venc=pend.filter(p=>p.fvenc&&p.fvenc<h);const hv=pend.filter(p=>p.fvenc===h);let msg='';if(venc.length)msg+='⚠ Vencidos: '+venc.map(p=>p.concepto).join(', ')+'. ';if(hv.length)msg+='🔔 Vencen hoy: '+hv.map(p=>p.concepto).join(', ')+'.';if(msg){ab.textContent=msg;ab.classList.add('show');}else ab.classList.remove('show');}
}
function imp_itemHtml(p){
  const h=hoy(),fs=finSem();let cls='item',bdg='';
  if(p.estado==='pagado'){cls='item done';bdg='<span class="badge b-green">Pagado</span>';}
  else if(p.fvenc&&p.fvenc<h){cls='item al-hoy';bdg='<span class="badge b-red">Vencido</span>';}
  else if(p.fvenc&&p.fvenc===h){cls='item al-hoy';bdg='<span class="badge b-yellow">Vence hoy</span>';}
  else if(p.fvenc&&p.fvenc<=fs)bdg='<span class="badge b-yellow">Esta semana</span>';
  else bdg='<span class="badge b-blue">Pendiente</span>';
  return `<div class="${cls}"><div class="item-h"><span class="item-name">${p.concepto}${p.periodo?` <span style="font-size:12px;font-weight:400;color:#888">${fmtP(p.periodo)}</span>`:''}</span><span class="item-amt cv-red">-${fmt(p.monto)}</span></div>
    <div class="item-meta">${p.fvenc?`<span>Vence: ${fmtF(p.fvenc)}</span>`:''}${p.fpago?`<span>Pagado: ${fmtF(p.fpago)}</span>`:''}${p.num?`<span>N°${p.num}</span>`:''}</div>
    ${p.obs?`<div style="font-size:12px;color:#888">${p.obs}</div>`:''}
    <div class="item-foot">${bdg}<div style="display:flex;gap:6px"><button class="btn-s" onclick="imp_toggle(${p.id})">${p.estado==='pagado'?'↩ Reactivar':'✓ Pagar'}</button>${isAdmin()?`<button class="btn-s btn-del" onclick="imp_del(${p.id})">Eliminar</button>`:''}</div></div></div>`;
}
function imp_renderPend(){const pend=S.impuestos.pagos.filter(p=>p.estado!=='pagado');const el=document.getElementById('imp-list-pend');if(el)el.innerHTML=pend.length?pend.map(imp_itemHtml).join(''):'<div class="empty">Sin pendientes.</div>';}
function imp_renderHist(){
  const mes=mesPref();let lh=S.impuestos.pagos.slice();
  if(impFH==='mes')lh=lh.filter(p=>(p.fpago||p.periodo||'').startsWith(mes));
  else if(impFH==='custom'&&impFHM)lh=lh.filter(p=>(p.fpago||p.periodo||'').startsWith(impFHM));
  lh.sort((a,b)=>(b.fpago||b.fvenc||'').localeCompare(a.fpago||a.fvenc||''));
  const el=document.getElementById('imp-list-hist');if(el)el.innerHTML=lh.length?lh.map(imp_itemHtml).join(''):'<div class="empty">Sin registros.</div>';
}

window.usr_updatePerm=async function(id,tab,checked){
  const u=S.usuarios.lista.find(x=>x.id===id);if(!u)return;
  if(!u.pestanas)u.pestanas=[];
  if(checked&&!u.pestanas.includes(tab))u.pestanas.push(tab);
  else if(!checked)u.pestanas=u.pestanas.filter(t=>t!==tab);
  await save('usuarios');
};
window.usr_updateEmail=async function(id){
  const u=S.usuarios.lista.find(x=>x.id===id);if(!u)return;
  const el=document.getElementById('u-email-'+id);if(!el)return;
  const email=el.value.trim();if(!email){alert('Ingresá un email');return;}
  u.email=email;await save('usuarios');alert('✅ Email actualizado.');
};
window.usr_del=async function(id){
  if(!confirm('¿Eliminás este usuario?'))return;
  S.usuarios.lista=S.usuarios.lista.filter(x=>x.id!==id);
  await save('usuarios');usr_renderLista();
};
window.usr_agregar=async function(){
  const nombre=document.getElementById('nu-nombre').value.trim();
  const email=document.getElementById('nu-email').value.trim();
  if(!nombre||!email){alert('Completá nombre y email');return;}
  if(S.usuarios.lista.find(u=>u.email&&u.email.toLowerCase()===email.toLowerCase())){alert('Ese email ya existe.');return;}
  const checks=document.querySelectorAll('#nu-perms input[type=checkbox]');
  const pestanas=[...checks].filter(c=>c.checked).map(c=>c.value);
  S.usuarios.lista.push({id:Date.now(),nombre,user:email.split('@')[0],email,rol:'usuario',pestanas});
  await save('usuarios');
  ['nu-nombre','nu-email'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  usr_renderLista();alert('✅ Usuario "'+nombre+'" creado.');
